body:
  text: 雪竇語錄中事雪竇開堂日扵法座前顧謂大眾勸君盡此一盃酒西出陽関無故人云若論本分相見不必高陞寳座但惟但惟乃以手𢫾一劃不犯之令云諸人隨山僧手看無量諸佛國土一時現前各各子細觀瞻瞎其或涯際未知不免拖泥𭘧水阿誰即便陞座突出難辨僧正宣䟽了維那白槌云法筵龍象眾當觀第一義時有僧出來時節難逢竇乃約住云如來正法眼蔵委在今日放行則瓦礫生光把定則真金失色一向一背權柄在手殺活臨時衲僧家自須知時命如懸絲其有作者相共證據只有人在僧乃問遠離翠峰祖席已届雪竇道場未審是一是二塞断盡大地人耳根竇云馬無千里謾追風風行草偃僧云与麼則雲散家家月也雪竇豈爭你底問德山臨際棒喝已彰和尚如何接人竇云放過一著佛祖吞氣僧擬議師便喝邪法難扶僧云未審祇与麼別有在竇云射虎不真徒勞沒羽前箭猶輕後箭𭰹問布髮掩泥因底事全身半偈為誰施蓋是天下衲僧大難事竇云天上天下唯我獨尊此老也是只解恁麼去也僧云若然者立雪豈能傳妙𣅀三拜伸後始為親可惜許竇云莫乱統老婆心切問梵王請佛蓋為群生學士請師當為何事竇云相識滿天下上是天下是地那裏得个消息來進云與麼則大眾霑恩也竇云你分上作麼生一賽兩彩進云學士證明若不是此明眼宗師竇云未在人情若好喫水也肥有俗士問十方同聚會箇箇學無為此是選佛處心空及第皈如何及第去竇云徒遭點額劈腹𭃰心進云如此則辜負平生也俗氣俗氣竇云教休不肯休象席打令問一焚龍萬象咸臻未審是何境界竇云金殿草漫漫古皇堂堂進云向上更有事也無竇云白雲千里萬里重疊関山路問吹大法螺擊大法鼓朝宰臨筵如何即是竇云清風來未休天平地平進云與麼則得遇於師也竇云一言已出駟馬難追隱而露僧礼拜竇云放過一著首正尾正竇又普觀大眾一廻乃云人天普集合發明个什麼事焉可𢆰分賔主馳騁問荅便當宗乗去銕壁銕壁廣大門風威德自在輝騰今古把定乾坤雲飛電轟千聖秖言自知牙齒咬磕也未五乗莫能建立是什麼所以聲前悟𣅀猶迷顧之端言下知宗尚昧情識之表因甚和尚到與麼地諸人要知真實相驀口便打為但以上無攀仰下絕己躬無孔銕鎚自然常光見前清風明月个个壁立千仞頂上無骨頷下有還辨明得也無有什麼饆饠䭔子快下將來未辨辨取未明明取道什麼既辨明得能截生死流同踞祖佛位盡大地那裏只恁麼會妙圓超悟正在此時天高地低堪報不報之恩以助無為之化拈了也竇在翠峯受䟽日洞庭檀越與明州專使相爭紜紜不已雲飛霧起竇乃陞座普告大眾不須作閙事在馿事未去馬事到來況僧家也無固無必謾人不少住則孤鶴冷翹松頂去則片雲忽過人間脚跟未點地應非彼此殊源動靜乖趣南地竹北地木今與諸人評議念三二𥝝洞庭晦迹羕四遠信心恩顧捿眾方諧舊轍蔵教復乃新皈苦哉佛陀耶豈可知感頓忘遽致前邁誠為不可而又四明太守星馳介使緇重俄臨既已跋涉數州迢遞千里脚頭脚底投誠苦逼一至於斯靣南見北斗進退審詳不能自决舉意知有敢問大眾住翠峯好往雪竇好意在𭰹潭于時眾僧高聲云往雪竇好莫孤𧴥人竇乃顧謂洞庭諸檀越云不用為訝冝各知時且佛法委自王臣兼住持亦以緣断在彼在此本无間然希披䟽文以塞來命便下座一二三四五六竇至晚小叅僧問四明侯伯遠降公文未涉程途請師速道竇云劄清風匝地進云鄞江一枝今日獨秀竇云不許夜行一彩兩賽竇乃云諸仁者未有長行而不住未有長住而不行日出月沒古之今之各有攸往四海九州且如茲院僻處一隅若非念報佛恩無以四來居此衲僧分上事恐山僧進發之後法席空虚今命素公開士接續住持幸兾眾慈同心勸請非但竇辤翠峯上堂僧問羕學士有言輟翠峯之祖席登雪竇之道場如何是不動尊竇云下坡不走快便難逢知時知莭進云與麼則動若行雲止猶谷神竇云你須緊悄草鞋好得便冝竇乃云山僧斯者抑徇彼請難可稽留束裝告行但多攀感至今人不禁況住持久煩勤舊備認嵗寒有什麼閑事希各務道專孜以副誠祝靣無慙色其有叅隨諸高士動逾千里俯近百僧飯袋子忽齋粥踈遺舩車隘窄在什麼處兾相回互禪恱自貽則佛国徧遊亦不為遠脚頭脚底何以諸禪德去來不以象故無器而不形動靜不以心故無感而不應半夜放烏雞然則心生於有心象出於有象什麼時休象非我出故金石流而不燋形非我生故日用而不動逼塞虚空紜紜自彼於我何為請諸人高挂征帆不勝珍重嗄又云恰是雪竇到萬壽眾請上堂僧問七事随身便請相見雙瞳自冷竇云打退鼓箭不虚發進云方始交鋒已見大敗臨危不變竇云噓天下禪和到者裏瓦解冰消僧擬議擬議底也少竇便喝者般漢有什麼死急四海浪平百川潮落問翠峯一箭已射雪竇雪竇一箭當射何人誰能辨的竇云不為鼷鼠發機一箭中紅心進云非但聞名今日親見千个萬个一个半个竇云添得一場愁作家宗師天然有在僧礼拜最是滴油箭竇云若是便休踞虎頭収虎尾乃云萬壽門下一一作家蓋是強將之兵也力㘞希咄咄咄然雖如是保福有言擊石火閃電光搆得搆不得未免𭈬身失命千峯㔟向岳邊止萬𣲖聲到海上消若教據令而行盡臺一境人个个三頭六臂到翠峯手裏也須瓦解冰消不施紅粉也風流如今放過一著分付萬壽和尚三十𥝝後作麼生竇到秀州百萬道者備茶筵請陞堂僧問赴請雪竇先至嘉禾向上宗乗請師㪯唱竇云鳥啼處處皆相似釋迦勒無分進云與麼則得聞於未聞也竇云不是苦心人不知東西南北一家風僧擬進語竇便喝萬里一條銕僧礼拜竇云別有問話者出來大地絕纖埃問如何是教外別傳一句竇云三生六十劫雲合霧起進云學人未會竇云碧眼胡僧笑點頭天下有幾人去得乃云山僧此者羕鄞江太守之命俾赴雪竇住持再至嘉禾增嘉幸脚板闊多少仍羕百萬道者曲賜周勤仰荷之懷无以忘也情㪯來看兼勞廣命碩德抑令㪯唱宗乗頼遭昨日聽取況逹士相逢非存目擊七九六十三若云言中有響句裏呈機猶曲為中下之流東西南北亦與麼去向本分衲僧遠之遠矣摸著𦛁後秖如適來僧問教外別傳一句對云三生六十劫諸人還知落處也無靣皮厚三寸且鷺池鷲嶺海甸庵園三百法會之中甚處有者个消息去得來不得所以道三𠀍諸佛不能自宣從者裏知你一代時教詮注不及阿呵呵除非知有莫能知之久立眾慈伏惟珍重也得也得竇到靈隱眾請陞座僧問遠別翠峯丈室將届雪竇道場如何是不動尊何不問得不動尊竇云看風使帆塞却耳根進云恁麼則觀方知彼去去者不至方認馿鞍橋作阿耶下頷竇云龍頭蛇尾果然問如何是祖師西來意竇云點劈不開進云猶有者个在互𡖖童子竇云三十𥝝後與其進不與退進云與麼則翠峯今日瓦解冰消傍觀何多竇云有些子不悮為雪竇乃云莫是與上座相爭兩鏃蒺䔧然則論戰也个个力在箭鋒相拄豈止而已又須是个特逹漢始得令我憶臨濟若意根尚滯直須向前決擇車不橫推所以長沙和尚道百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方𠀍界是全身靣前背後皈去來僧㪯問南泉百尺竿頭如何進步泉云更進一步烏飛兔走僧復問瓦官官云百尺竿頭用進作什麼一二三四五僧不肯却是少也官便打正令方行竇云大眾古人機變出在一時萬里一條銕其間別有商量亦未言著个个恁麼知且如雪竇今日再入靈隱也似百尺竿頭依南泉之言得進一步喜與大眾相見則十方𠀍界一時周帀步步清風起便下座佛眼難覰竇到越州羕天寺眾請陞座僧問學人不問西來意蔵身北斗意如何何必望天衢竇云拈頭作尾漢拶破銕靣觜進云請師答話一口無兩舌竇云西天令嚴天上人間知幾幾問有問有答賔主歷然無問無答時如何竇云古路草漫漫把断要津不通凡聖進云若不上來焉知與麼口上著竇云利劒不斬死漢也是放身捨命處乃云作者相見一拶一𭡠撩起便行若佇思停機卒摸𢱢不著若言問在答處答在問宗个个依草附木野火燒不盡問不在答處答不在問宗罕見頂上有眼春風吹又生諸人還薦得也無薦得薦不得並是新雪竇之過且莫鈍致羕天和尚半是河南半是河北越州檀越備茶筵請雪竇陞座僧問檀越殷勤伸三請乞師方便指迷津竇云不許夜行投明湏到夜行莫蹋白不水便是石進云非但學人四眾有頼竇云百千𥝝後千𥝝田八百主問如何是祖師西來意竇云迢迢十萬餘鳥飛不渡僧礼拜竇云拄杖不在西天令嚴乃云諸檀信山僧暫以經過邂逅相遇何沐恃隆異待抑俾敷揚依樣𦘕猫兒且如羕天和尚寅暮流慈諸人況足異聞已絕希兾何必更煩雪竇重為發宣落人之綣繢直饒三𠀍聖人六代開士利生間出故不敢錯誤諸人𮈔毫滿靣慚惶然雖與麼放過即不可此囬難究取良久云不解作客勞煩主人彈指三下竇皈寺上堂有僧問如何是雪竇正主竇云何不問雪竇山中人頭長三尺知是誰相逢無語獨足立進云與麼則把定乾坤去也竇云出門唯恐不先到當路有誰長待來九九八十一問如何是古佛家風竇云青天白日描不就進云還許學人領會也無竇云不是劒客請莫相過𦘕不成問如何是第一句竇云袖裏金槌錯僧便喝竇云朝三千暮八百一鎚兩當問如何是雪竇境竇云天無四壁月白風清進云如何是境中人竇云月在中峯傍觀有分進云與麼則從苗辨地因語識人竇云是水長舩高僧礼拜竇云酌海持蠡一場困苦殺人刀活人劒乃云甚生摽格還知也無謾諸人即得諸禪德祖佛不能宣𫝊天地不能覆載二乗聞之膽裂十地到此魂驚須山其或達士切磋頗逢決戰一拶一𭡠略露風規崑崙嚼生銕句滯則岳立磨空源迷則雲橫布野道什麼所以先聖道一言纔㪯千車同轍該括微塵猶是化門之因風吹火你衲僧合作麼生覬自知時便下座築著磕著上堂僧問羕師有言三更過銕問意旨如何竇云忠言不避截舌塞断人口僧礼拜竇云臨筌方覺取魚難重疊関山路問千山萬水穿雲去撥草瞻風事若何竇云蹋破草鞋事從叮嚀生進云為什麼如此竇云人無遠慮必有近憂恭而無礼問如何是向去底人竇云伊蘭樹下坐塞殺舜若多神鼻孔裏進云却來時如何竇云白日遶須刺破眼睛進云天上天下唯我獨尊疑著你底竇云二頭三手漢有誰吐舌去問羕師有言釋迦老子出氣不得甚處誵訛須是問得始得竇云君子千里同風須是荅得始得進云與麼則殃及子孫也非但你也竇云素非鴨類何必乃云諸禪德直饒文殊辯認螢火為太陽居士杜詞指魚目同明月南山北北山南所以雪竇尋常道威音王已前無師自悟是第二句還我第一句來咄若未能把定要津不免奔馳南北誰上堂因僧送拄杖上雪竇竇拈起成頌云清峻孤根別有靈突出難辨勢含山水自分明無限碧雲猶未囬提來勝得豐城劒誰敢近傍報盡人間兩不平也何妨復云大凡以平報不平是義烈常凖斬頭覔活以不平報不平為格外清規三頭六臂亦猶以智遣惑頗逢下士擔枷過狀以智遣智罕遇作家好个消息要會兩不平麼人無遠慮必有近憂諸人也沒量罪過雪竇也沒量罪過點雪竇過自能檢責你者漆桶不打更待幾時以拄杖一時趂下有意氣時添意氣不風流處也風流打云个山鬼窟裏活計冬至上堂僧問皷聲纔罷海眾齊臻新節一句請師垂示竇云三日前五日後什麼處去進云與麼則聞於未聞竇云索短不搆深泉幾人蹉過去也問文殊仗劒其意如何竇云八十老僧閑灌頂頂上無骨頷下有鬚進云學人不會竇云四溟無浪月輪孤月落不𩀌天水流元皈海僧良久竇喝云甚處去也逐狗逼墻僧礼拜竇云放過一著射虎不真徒勞沒羽乃云相逢不拈出㪯意便知有風行草偃早是不唧𠺕漢雪竇也須解與麼話更乱踏步向前實謂苦屈把手拽不入諸禪德看他先覺未離兜率已降閻浮未出母胎度人已訖南山燒炭北山紅若言周行七步目顧四方天地之間唯我獨尊尚有人不放伊過報恩有分如今巧異端不肯荷負真可哀愍兩頭三面所以道天魔外道是辜恩德漢涅槃後有聲聞二乗是自欺誑人三生六十劫你見如此不平之事便合憤悱驅將去喝將去隨例道我不知不會也不𢙣者般底苦海裏有什麼出頭時也是快活時節上堂云形興未質名起未名月白風清形名既兆游氣乱清風清月白竇拈起拄杖云大眾拄杖子是形名雙㪯還有過也無有即水裏月魚行水濁無即形名兆鳥飛毛落若也究得實謂恩大難酧果然上堂云未出母胎見成公案松直𣗥曲周行七步過犯天萬里一條銕更入鹿野苑中枝蔓上復生枝蔓清風來未休乃拈起拄杖云吽吽便下座打云是什麼上堂僧問如何是佛法大意竇云祥雲五色天盖不得地載不得進云學人不會竇云頭上漫漫虚空容不得日月照不得問如何是觸目菩提竇云風動塵起鳥飛落毛銀山銕壁付與甚人進云乞師再垂方便竇云洎被打破蔡州臨危推人打著也未問如何是教外別傳一句竇云好問劄進云還許學人領會也無竇云有頭無尾漢斬釘截銕普州人送賊乃云諸仁者夫宗師唱道譬若滄溟上客獨泛蘭舟月渚烟波隨情放曠無孔銕鎚欲拋香餌須待長鯨若是長鯨豈貪香餌道道縱有纖鱗應無希冀三十棒教誰喫一句合頭語萬劫繫馿橛上堂云一徑直錯二周遮得衲子辨得俱眼裏生花千便下座靈龜曳尾上堂僧問達磨西來單傳心印諸方為什麼各異端竇云誰一筆勾下進云爭柰即今何竇云西天令嚴殺人不眨眼進云與麼則入水見長人大眾見者僧竇云韓信臨朝底逢人且三分話未可全拋一片心問三通皷罷群賢集請師拋下御前題且道个僧問得問不得竇云長因人處憶得別家時此𦒳道答得三十棒若不答得也三十棒且作麼生定當得進云與麼則退身三步竇云依舊漁翁把釣竿徐行蹋断流水聲縱觀冩出飛禽迹問不除妄想不求真底是什麼人竇云一宿覺諸人須辜負永嘉禪師進云與麼則天上天下唯我獨尊什麼處去也竇云一撥便轉也不可容易乃云大凡出眾切磋也須是本分禪客一切難致得若未具啐同時眼卒摸𢱢不著衲僧家到此也須用得始得上堂眾方集定竇云不用低頭思量難得便下座拈云花須連夜開莫待曉風吹上堂云直鈎釣鯤鯨曲鈎釣龜鼈収將來曲鈎若在鯤鯨理應未可直鈎若在龜鼈情亦不甘直饒化鵬去不干我事直饒戴蓬萊不干你事畢竟如何乃打如今拋鈎也𧴥命者上鈎來莫辜𧴥三權好良久𠋣天長劒逼人寒云勞而無功便下座知時知節上堂眾集定竇起立云雪竇得與麼長諸人得與麼短若人道得齊肩句許伊把定乾坤便下座依稀似曲絻堪聽又被風吹別調中上堂云久雨不晴衲僧向甚處曬㫰皮草便下座眼裏耳裏上堂云布袋裏盛錐子不出頭是好手明眼漢也須犯手復云大眾雪竇錐頭出也莫有傍不肯底禪客出來山僧退身三步良久云諸人既乃縮頭且聽諸方撿責天下有多少負笈去舉古㪯僧問趙州道人相見時如何後靣不容州云呈漆器似受屈相似竇云諸禪德還有識趙州底麼出來相共商量點則不到若未能辨明大好從頭㪯與伱點破當𥝝大有僧不肯又作麼生四九三十六二無兩般収果然㪯林際示眾云有一無位真人常在汝等靣門出入用出入作麼初心未證據者看看用看作麼時有僧問如何是無位真人際下禪床擒住劈腹𭃰心者僧擬議不可辜𧴥也際托開云無位真人是什麼乾屎橛臭氣臭氣雖然如是宇宙空來更有誰雪峯聞云林際大似个白拈賊可惜許竇云夫善竊者神鬼莫知既被雪峯覷破林際不是好手因風放火復召大眾雪竇今日換你諸人眼睛了也你若不信各皈寮舎自摸𢱢看関鏁重重卒難開㪯僧侍立保福次福云伱得與麼麁心開僧云甚處麁心也不𢙣福拈一塊土與僧你拋向門外著可惜許直如絃曲如釣僧拋了却來云甚處是其甲麁心不少福云我見你築著礚著所以道你麁心北斗黑竇云然則者僧被保福𭵴瞞爭柰真不掩偽曲不蔵直打云時人窠窟雪竇將今視古於理不甘能幾个與麼來是你者一隊漢忽僧堂裏來寮舎內出築著礚著亦乃不知最是麁心近來麁心轉盛我若放過便見諸方檢責如麻似粟竇驀拈拄杖下座保福來也大眾一時走散麁心麁心㪯雪峯敲觀和尚門響在後面觀云誰二事一時峯云鳳凰兒展冲天之翹觀云作什麼出頭天外看峯云鵮老觀要知滋味觀便開門銕槌擊不開雪峯方入移身不移步觀把住云道道接羅六合峯擬議何不劈靣打被觀推出放過一著峯住後示眾云我當時若入得老觀門你者一隊噇酒糟漢向甚處摸𢱢也要拔本有老宿云雪峯徒有此語當時入不得如今也入不得矮子看戱竇云者辜恩𧴥德漢有什麼交涉此破口漢當時入不得豈是教你入今既摸𢱢不著累他雪峯俗人沽酒三㚈俱在老觀門下後代兒孫也須蹋破草鞋㪯林際侍立德山山云今日困不同少少際云者老漢𥧌語作什麼只似平生著衣山便打盡十方世界何人不得知个痛痒際掀倒繩床盡大地坐者立者俱𭈬身失命山便休𭝠隱處黑竇云二貟作者具啐同時眼有啐同時用千𥝝田八百主雪竇擬向猛虎口中奪鹿饑鷹爪下分兔千雙万隻敢謂林際德山二俱瞎漢有人辨得天下橫行未免以蝦為目㪯乾峯和尚云㪯一不得㪯二放過一著落在第二黃連未是苦雲門出眾云昨日有人從天台來却往南岳去甘草未是甘峯下座云大眾來曰不要普請万沠聲到海上消竇云看他作者吐露个消息宛尒不同更有誰知若是瞌睡漢遞相鈍致粘手粘脚有什麼了期乃拈起拄杖云放過一著便下座自尿擇濕處㪯玄沙云吾有正法眼蔵付囑摩訶大迦葉猶如話月曹谿竪拂猶如指月月明照見夜行人皷山云月玄沙云者阿師就我覔月官馬相蹋皷山不肯却皈眾云道我就他覔月知言哉竇云玄沙皷山如排百萬軍大陣秪拋瓦子相擊忽然去得底亦作麼生或有衲僧辨得當知正法眼蔵付囑有在若是衲僧須知雪竇有在㪯長慶云淨潔打疊了也却近前就我覔還知慚愧麼我劈脊與你一棒不受佛祖之謾底在什麼處有一棒到你你須生慚愧無一棒到你你又向什麼處會阿誰是長慶門下客竇云雪竇即不然淨潔打疊了也直須近前守株待兔我劈脊與你一棒且道是賞是罸有一棒到你你即受屈朝打三千暮打八百無一棒到你與你平出但與麼會雪竇也須會取一半勘辨一日侍者報有三人新到從瑞巖來好心好心竇云教伊大展坐具礼拜著不得好報其僧方入門竇驀拈起拄杖啞子喫苦苽僧云某甲特來礼拜和尚阿你去也來竇云吽吽那个是叅頭有人孤𧴥雪竇是好手一僧近前問訊似个甚麼竇云你為什麼失却本道公驗若似个老漢不如似旃陀羅僧云深領和尚慈悲領倒者老漢竇云過者邊立頼有一著在復問第二人求朋須勝己似我不如無竇以拄杖指參頭云你為什麼隨者漆桶相逢盡道休官去僧云某甲新戒大小大雪竇被者僧勘破竇亦約云過者邊立此恩難酧又問第三人適來兩个敗闕了也你堪作个什麼好个老漢向人恁麼道僧擬議也未知你手臂在竇便喝云過者邊北斗南星位不殊乃云據令一時埋却且念遠來叅堂去見者聞者權者實者且向个葛藤裏去問新到尋師訪道翫水遊山古來榜檨僧云謝和尚顧問諸方榜檨竇便喝鼻孔裏祗對我爭敢靠倒僧無對爭敢鈍致竇云苦殺人非但來來曾到雪竇麼殺人須見血僧云不曾到幾人喚作半前竇打一棒云他後不得諱却千聖齊立家風一日二人新到竇云座主衲僧黃連未是苦僧云請和尚相識滿天下竇云一不成二不是三𫨻不同僧云不勞如此遊山翫水底也少竇云我且放過朝到西天暮皈東土作麼生它時有人也傍觀僧無對而今有人喝將去竇云杜衲僧叅堂去將謂雪竇法令嚴問新到近離甚處只冝拄杖子僧云和尚道什麼幾人點頭去竇云我問你近離甚處還我三頭六臂來僧退身立頂門上脚跟下去得來不得竇云克由尀耐不言來處將拄杖來不知誰是个中人僧云某甲近離奉川者僧實是近𩀌奉川竇云打野榸漢何不早與麼道一筆勾下復問第二人你也一處來僧云某甲近離大梅可謂贏得一籌竇云兩叚不同好與三十棒且放過性命不存一日宗首座到方擬人事它日有人㪯竇約住云既知信之韜略便須拱手皈降知我罪我宗云今日敗闕向愁人愁殺人竇云劒甲未施賊身已露囯有憲章三千條罪宗云氣急殺人倒地者從地起竇云敗將不斬七星光燦爛宗云是莫作雪竇門下客竇云礼拜著順水之浪也難得宗云三十𥝝後有人㪯在是則是爭柰孤負時節竇云已放你過得而不戮能幾人問聦道者久叅事作麼生莫借目於𩀌朱道者云青天白日休假耳於伶倫竇云乱走作什麼用盡神通作麼者便喝似則似只恐喝下事未圎竇云喫棒如電如霆者擬㪯手迅雷不及掩耳竇打一坐具云你看者瞎漢乱與劒輪飛處日月沉輝寳杖時乾坤失色一日五人新到竇云你𢝰不消行脚古人云何魔魅教你行脚是同是別僧擬議冬行春令亦作麼生竇云一狀領過據欵結案有良周上座到與麼阿師竇作瞌睡勢如何若何到者裏瓦解冰消僧云新到相看如履薄冰竇不應獨非阿你僧又云新到相看爭似比來乎竇高聲云阿誰先人不如後人僧云新到莫謂新到竇云已知叅堂去觀大海者難為水僧云某甲是大龍受業且問諸人此僧衲衣下事作麼生竇喝云漆桶誰識你謝勞煩者老僧便近前人事遊聖人門難為言竇云好好礼拜著無反囬之勢相看了竇云還識宗首座麼緫由尀耐僧云是師兄也好須知時竇云你為什麼鈍致他有路可上高人先行僧云和尚𠇲得也更買草鞋行脚竇云踏破草鞋漢不能打得你且坐喫茶首正尾正問僧近離甚處不可不知來處僧云天台月在石橋更無月竇云還見智者麼不知誰是月邊人僧云見特地一場之愁竇云為什麼在我脚底殺人不眨眼僧無語在什麼處竇云脫空妄語百千𥝝後不道無問僧近離甚處雪竇也不得知得僧云溫州草鞋和露重竇云還識永嘉大師麼个老認一宿覺一宿覺認个老僧云是鄉人憶得送人時竇云與你隔海豈止千里万里僧云酌然你衲僧家到者裏作麼生酧對竇云面赤不如語直好个老漢領將去僧無對諸方多是向者僧看竇云噓和尚頼是大人竇在大龍為知客李殿院到山茶話次問竇知客是長老鄉人不妨入境問風竇云不敢不誤為知客院云且在者裏不得乱走官家榜𪮲竇云本為行脚似飄風洒雪院云行脚為甚事疑著阿你竇云看乱走底道即道只道得半邊院微笑知音知後更誰知竇在池州景德為首座時太守曾學士入院相訪茶菓次學士拈个𬃷棗子拋在地上召竇首座万物無如出處好竇應喏象蓆打令士云古人道不離當處常湛然在那裏慣御前題竇指景德長老云秖者老子也不知落處在幾人舌頭上士云首座知也不得無過个措太且守信底竇云明眼人難瞞彼此落便冝竇到太湖有余巡檢請竇并志依上座齋臨起檢問𤰞官今日命二衲僧齋得何果報必須得其報竇云圖他一粒米失却半年糧酌然依云臨行方覺主人寬唱歌須是帝鄉人竇召舎人舎人擡頭也須遭人點檢竇𢫾依云垜根衲子齋他有甚益一槌兩當巡檢大笑且道是笑得笑不得竇便起去石火難及電光罔通竇赴雪竇經過杭州徐轉運問竇雪竇名山多有具眼底衲僧忽相靠來長老作麼生支遣他最是可愛竇高聲召客司司近前竇云運使問个什麼何必勞筋力使云推過來一場笑具竇云推過又爭得作家眼目使無語前頭何在竇云彼此沒便冝倒岳傾湫也未為竒特使又問長老幾日渡錢塘江淺深人不知竇云山僧未敢前去後語也作麼生使云作个什麼猛獸何肯床下顧竇云徐轉運把断要津果然使云今日被長老揉我一上因甚只麼去竇便辤退世情偏向有錢家竇在南岳福嚴為蔵主李殿院同雅長老入蔵院竇出接殿院云蔵主那答在問處竇云不敢何必院云蔵中著下官麼付嘱有在竇云目前可驗出來与你相見院云驗底事作麼生相別相逢竟何事竇云不消一劄一聲江上起春雷院無語時節難逢竇云且請殿院皈寮喫茶自從金革聲消後惟聽堯民擊壤歌坐次山嵐忽起雅云殿院遊山恰阻烟霧時不再來焉院云靈峯聖跡為什麼却有者个可問過竇云下方無窮無不已院擬道過也雅云蔵主壯觀福嚴一等家風竇云和尚且莫開眼爭之有餘院云作家作家亦是同人會竇云殿院尊重實知言哉時有道士秀才到院又問三教中那教最尊洎放過竇乃起側身而立佛祖近傍無路院云有口何不道你是安祿山竇云對夫子難言院云休休便起可憐可憐竇云適來造次此語故是過量竇在舒州海會時因看胥通判問山中多少眾俗氣也有此事竇云一百來僧俊鶻趂不及胥云既是海會為甚秖有百僧好拶好拶竇云人貧智短用得个一著胥云更道人無遠慮必有近憂竇云他後有人㪯在慎終須如始又問山中長老每日个什麼三千里外見誵訛竇云路逢劒客便呈劒胥云吽雪消山骨露竇便辤退雲出洞中明竇在明州看曾學士坐次士問曾與清長老商量趙州勘破婆子話端的有勘破處麼學士幾時學得个虚頭禪竇云清長老道个什麼蠅見血士云又與麼去也兩賽一彩竇云清長老且放過一著一彩兩賽學士還知天下衲僧出者婆子綣䙡不得麼自領出去士云者裏別有个道處趙州若不勘破婆子一生受屈扶佑天下也未竇云勘破了也築著磕著竇與僧眾入城緣化未免傍觀之哂學士先有公文止絕僧道投刺真个金毛獅子竇亦同例敗不少乃有頌寄士云碧落烟凝雪乍晴見成公案得人憎住山情緒寄重城千里風光使君道在未相見亦何妨也空戀甘棠影裏行更皈去來學士回答云勞勞𠀍務逐浮沈一氣不分一性澄明亘古今穿過靣門了也目擊道存無阻隔能去得好何須見靣始知心還我个消息來復令人請竇相見了狸奴白牯且退後退後士云道存無阻因甚入來不得重言不相容竇云他後見別處長老學士不請㪯向伊大地黑漫漫士云㪯著又何妨富不學奢竇云山僧罪過知過必改能幾人士云好好不得打著竇云喏喏不對夫子也作麼生學士解印後竇送到越州住數日不惜眉毛乃辤須撫掌士堅留緩緩地竇云皈山住持不忘學士此日區區地作麼士云衲僧家愛把不定屋裏事不許㪯竇云爭得到者裏穿雲透石不辤勞士無語放過一著竇云已沐學士放辞好語不出口𢙣語傳千里士云容出城相相見無事是什麼竇便退諸人莫瞌睡士至客亭排果子茶湯了舌拄上齶竇問學士自此一別甚處再得相見途路稍遠士云長老何以對面忘却分明記取竇云微僧心亦足矣草鞋重多少時廣慧和尚復問竇自此一別甚處與學士再得相見鶴飛千尺雪竇云直是千里萬里龍起一潭水於是取別八角磨盤空裏走士云善為道路窮則變竇云喏喏變則通後錄上堂日日日東上日日日西沒上崢嶸無天下崢嶸無地循環三百六十幾个解知窠窟却見謾却盡大地人放開精精打云野狐精魅把定恍恍惚惚賣弄不少君不見毗耶離城彼上人一室寥寥是何物從旦至暮竇召大眾云高著眼突出難辨便下座遇貴則賤上堂云黃金為地白銀為壁是什麼境界釋迦老子不合向者裏屙誰是釋迦者竇以拄杖撥一下云看看落尒諸人頭上九九八十一上堂云三千劒客今何在収獨許莊周致太平便下座龍頭蛇尾一日云大眾者一片田地分付來多時也閑葛藤尒諸人四至界畔猶未識在莫動著動著三十棒若要中心一樹子我也不惜可惜眉毛良久云放憨作麼便下座舌頭曳地因雪示眾云頭上皚皚脚下皚皚寒毛卓竪金色尊者獨上高臺笑未休開眼造罪合眼受灾瞎如何如何天網頭上脚下上堂眾方集定既落第二竇云勘破了也吽便下座㘞上堂拈起拄杖日月易流云物中眼眼中物一二三四五六十方如來同此超出更道來看還會麼不堪共語瞎漢皈堂兔馬有角牛羊無角上堂云龍泉與刀斧同銕利鈍懸殊花須連夜開駑駘與驥馬同途遟速有異莫侍春風吹酌然酌然且緩緩一出一入半合半開金鍮難分平展之流試辨緇素也何難辨上堂云直得動地雨花何如皈堂向火便下座還我話頭來竇一日晚叅於僧堂前立云不打皷上去不得把却門入來不得速道速道當風者誰大眾眼目定動不得相欺竇以拄杖一時打趂去去來來上堂云田地穩密底祖佛不敢近為什麼擡脚不起要灸猪左膊重又云神通遊戱底神鬼不能測為什麼下脚不得要脚跟紅𮈔線輕直饒十字縱橫朝打三千暮打八百要不欠一棒上堂㪯雲門大師云禪河隨浪靜山河大地不是浪渴馿逐陽熖竇拈起拄杖云看看一處起千處百處沒觜頭上漫漫脚下漫漫一處息千處百處不識半夜放烏雞還會麼皈堂堆山積岳上堂云見一則瞎汝眼了又不顧知一則翳汝眼莫擡眸翳生則天上人間瞎却則三頭六臂與你景從或若辨得許尒十字縱橫背靣自全上堂云以字不成八字不是刺破眼睛優曇花正開撑天拄地齅著無香氣穿却鼻孔笑釣魚船上客不愛南山愛鼈鼻三𫨻不同僧問萬里無雲伸一問青天喫棒意如何竇云軍隨印轉打皷擊金僧云恁麼則在和尚手裏多少力盡竇云利劒不斬死漢囯無二主上堂云春山疊乱青春水漾虚碧和氣靄然寥寥天地間獨立望何極便下座富而不奢却顧謂侍者云適來有人看方丈麼依稀似曲纔堪聽云有傍觀作麼生竇云作賊人心虚神鬼難窺上堂云大無外小無內南地竹北地木半合半開成團成塊也是老胡既隔絕衲子多違背銕丸無縫鏬從他千百萬古長漫漫填溝塞壑半夜吞墨汁沒人會道來看以拄杖卓地一下雪竇在甚處云皈堂來也一日上堂眾方集以拄杖橫案膝上云恁麼會得瞎却天下人眼道什麼復拋下拄杖云救取一半便下座手臂不向外上堂云十方無壁落四面亦無門淨躶躶赤洒洒沒可把那裏曾恁麼來灌溪老出頭不得且致是褒它貶它試定當看我騎牛入尒鼻孔裏古路倒走一般漢聞人恁麼道若風過樹頭有什麼共語處為甚我不得到此上堂云一不定二不可上下四維春風包裹提不起桃花杏花闘開栁條桒條憋破與釋迦老子雪屈可憐昔日靈雲剛道迷逢達磨少室峯前事竇拈起拄杖云咄靈雲鼻孔穿了也還識痛痒麼上堂云垂𮈔千尺意在深潭莫月穿潭底麼離鈎三寸釣得一个是好手定是蝦䗫也良久云勘破了也𧴥命者上鈎來莫辜𧴥望麼一目小㕘示眾云須菩提巖中宴坐與个野狐同參諸天雨花讚歎果然見弄倒个妖恠尊者云空中雨花讚歎復是何人若是衲僧到者裏合作麼生云我是梵天尊者若不采你亦向甚處去尊者云汝云何讚歎天云我重尊者善般若波羅蜜多義出豐𥝝儉生不孝尊者云我於般若未曾一字汝云何讚歎天云尊者無我乃無聞無無聞是真般若波羅蜜多又復動地雨花臨崖看虎眼特地一場愁竇云避喧求靜處世未有其方頼有雪竇在他在巖中宴坐也被者一隊漢塗糊伊正當恁麼時如何更有者老把不住問云空中雨花讚歎復是何人早見敗闕了也莫曲彔木上麼我重尊者善般若波羅蜜多𢙣水驀頭潑句裏明人我於般若未曾一字草裏走者囬須皈去尊者無我乃無聞識甚麼好𢙣十个有五雙㪯得去𢝰似者般底何處有今日大眾也須打退鼓竇復召大眾念久立好雪竇幸是無事人尒來者裏覔个甚麼何早不落草以拄杖一時趂下逢著明眼人合喫三十棒上堂㪯僧問趙州至道無難唯嫌揀擇是時人窠裡否你頼是無事人州云曾有人問我直得五年分踈不下放過一著竇云識語不能轉死却了也好與二十棒大匠用水者棒須有分付處尒若辨不出且放此話大行攸願出頭示眾云春力不到處枯樹亦生花君見麼九秊人不識祖師䘮了也幾度過流沙還我話頭便下座長安雖樂難久居有時云馬祖陞堂百丈捲蓆金不博金水不洗水正令不從拗曲為直半合半開上堂云似地擎山不知山之孤峻如石含玉不知玉之無瑕如麻似粟晝行三千夜行八百是我尋常用底九九八十一拈放一邊尒諸人向甚處見盤山速道速道雲飛霧卷上堂㪯僧問趙州二龍爭珠誰是得者爪牙何備州云老僧只管看不可不爭去竇云看即不無爭即不得又逐流鶯過短墻且道扶者僧扶趙州纔堪聽上堂云不是金色頭陁有理也無雪處便下座倒退三千也未一日示眾云城東老母與佛同時而生一世共處在甚處而不欲見佛徹頭徹尾每見佛來即便廻避有眼也無周廻上下皆避不及一掌云你何不向此廻避乃以手掩靣十指掌中悉皆見佛先行不到末後為初諸上座他雖是个老婆𭓩有丈夫之作且道是第幾機既知廻避稍難不免吞聲飲氣何必如今不欲見佛即許尒切忌以手掩靣文彩已彰何以明眼底覷著將謂雪竇門下教尒學老婆禪果然㪯黃蘗入堂於南泉位中坐至今起不得泉問長老甚秆中行道有舌頭也無蘗云威音王已前且放你過泉云猶是王老師兒孫下去長安雖樂難久居蘗便起去至今來不得竇云可惜王老師只見錐頭利是言也有分我當時若作南泉待伊道威音王已前即便於第二位坐令黃蘗一生起不得也得一路雖然如此也須救取南泉雪竇因甚到與麼地㪯藥山久不上堂正令已行知事白云大眾久思和尚示誨你道藥山須到也無山云教槌鍾著幾人人更側耳大眾方集也是伶俐漢山便掩却門逹磨九𥝝覷不破知事咨白既許為大眾上堂為什麼一言不施好一拶山云經有經師論有論師爭恠得老僧瓦解氷消竇云可惜藥山老漢平地上喫撲盡大地人扶不起人無遠慮必有近憂㪯石鞏曾為獵人趂一鹿從馬大師庵前過佛手遮不得問云還見我鹿麼釘觜銕舌大師云尒是甚人在石鞏脚底鞏云我是獵人果然馬云尒還解射也無恩大難酧云解射可痛可喜馬云一箭射幾个中也云一箭射一个好箭放不得所在馬云尒不解射至今中的者少鞏云和尚莫解射否看他向上人自然有此作馬云我解射李廣何在鞏云和尚一箭射幾个鈍致殺人馬云我一箭射一羣敗不少鞏云彼此生命何用射他築著磕著馬云尒既如是何不自射此語是射一鹿射一群且定當看鞏云若教某甲自射直是無下手處有麼有麼馬云者漢無明煩惱頓歇便打鞏於是以刀断其髮在庵給侍且道報恩是酧冤竇云馬大師一箭射一羣信彩射得有甚用處不如他石鞏一箭射一个却是好手看个箭後路雪竇今日効古人之作擬放一箭紅心誰辨高聲喝云看箭鏃鏃又云的復云中也便下座㘞㪯同光帝命諸禪師坐次云朕収得中原之寳只是無人酬價德兮不孤興化云如何是陛下中原之寳囯清才子貴帝以兩手展幞頭脚大有人著眼去化云君王之寳誰敢酬價簾前坐得竇云至尊所得只可傍觀也是若非興化作家往往高價酬却南番大舶主本此土商人一日上堂良久云大施門開無擁塞在甚麼處忽然有个衲子出來雪竇倒退八百也無擁塞何以臨危不悚人便下座與麼與麼㪯保壽問胡釘鉸云莫便是胡釘鉸無人思此問鉸云不敢豈敢壽云還釘得虚空麼莫共語云請和尚打破將來可惜許你不打破壽便打一搥兩當鉸云莫錯打某甲至今喫得者少壽云向後遇多口阿師與尒點破去在龍頭蛇尾後至趙州㪯前話問云不知某甲過在甚處何不打出去州云只者一縫尚不柰何將謂趙州老胡釘鉸於此有省鈍置多少人竇云雪竇要打者三个漢第一趙州不合瞎却胡釘鉸眼著甚來由第二保壽不能塞断趙州口一家父子第三胡釘鉸放過保壽許見此語竇驀拈起拄杖云更有一个大眾何不下手大眾一時走退好與麼去竇擊繩床一下便起去飄風不終朝上堂云善財別後誰相訪樓閣門開竟日閑便下座作麼作麼㪯肅宗帝問國師百𥝝後所須何物入个三昧國師云與老僧作个無縫塔子撑天拄地帝曰請師塔樣多少人眼目定動國師良久云會麼有人仰望不及帝云不會孰若武帝國師遷化後帝詔躭源問此意如何果然源云湘之南潭之北瞎却眼睛中有黃金充一國明皎皎黑漫漫無影樹下合同船万里一條銕瑠璃殿上無知識飢者飽足竇云肅宗不會且致躭源還會麼雪竇只開得一隻眼只消个請師塔樣盡西天此土諸位祖師遭者一拶不免將南作北且道是褒是貶有傍不肯底出來我要問尒那个是無縫塔大底任它肌骨好不塗紅粉也風流㪯雲門與長慶在雪峯日因舉石鞏見僧便云看箭三平到遂擘開胷鞏云三十𥝝一張弓兩下箭只射得半个聖人雲門問長慶作麼生道免得石鞏喚作半个聖人幾乎在背後立慶云若不還價爭辨真偽遠問近答雲門云入水始知有長人近問遠答竇云石鞏要先拗折不難朝打三千暮打八百爭柰三平中的了也一死更不再活然則老宿要活三平且未免張弓架箭不為鼷鼠發機上堂云一花開天下春天下衲僧跳不出古佛為什麼不著便幾被用去此人尒若透得救取天下老宿一不做二不依忽若有个衲僧出來云和尚且自救也許伊是金毛師子恐是也是㪯舎利弗問須菩提夢中六波羅蜜與覺時同別不似帝釋天花乱墜須菩提云此義幽深吾不能此會有𢏏勒大士汝往彼問却問舎利弗竇云當時若不放過随後與一劄誰名𢏏勒誰是𢏏勒者不免放出便見冰消瓦解龍頭蛇尾㪯傅大士云要知佛去處咬著去竇云三生六十劫錯末後一句天下衲僧跳不出在什麼處直饒口挂壁上漢別有一竅勘過了打和身打不著㪯紫湖和尚山門立一牌牌上有字云紫湖有狗上取人頭中取人腰下取人脚擬議則𭈬身失命劈腹剜心時見新到便喝看狗囓枯骨作麼僧纔廻首蒼天蒼天湖便皈方丈皈去甚麼處竇云眾中𢝰道者僧著一口著即著了也爭柰者僧在磨𤥨它爪牙敢問諸人紫湖狗著者便死因甚麼者僧猶在借路經過若無知方眼救得者僧鈍致煞人設使紫湖出世咬煞百千萬个有甚益𮨇視左右云誰我當時若見先斫下牌然後入院直饒與麼䘮身失命底待者老漢喝云看狗與伊放出个焦尾大威風匝地寒如今諸人要見麼日勢稍晚皈堂誰敢近傍上堂云國無定乱之劒四海晏清也野老擊壤不是分外道甚麼還有梯山入貢底麼不無有始只少有終因中山主為竇煎茶塞断𠰸喉竇問僧尒随例喫茶將何報答要普同供養僧云因風吹火可惜許竇不肯自代云難為和尚古路㪯動搖復云還會麼力盡神疲僧云不會報㤙有分竇云尒也湏煎一會茶始得重疊関山路㪯長慶示眾云撞著道伴交肩過一生叅學事畢一進一退竇云是即是針不劄風不入有甚麼用處無孔銕槌重下撅上堂云摩竭掩室計校未成毗耶杜辤伎倆俱盡可笑一對無孔銕還有人點檢得者兩个老漢出頭不得處麼將常住物作自己用直饒覷透更有个漢礙著以拄杖擊繩床一下便下座相逢盡道休官去林下何曾見一人有時云槌擊妙喜世界百雜碎底人為甚麼處處解持鉢富而不憍代云東壁挂葫蘆又云不在又云知時頻到香積國底人為甚麼拄杖頭上失却眼瞳人舞三臺代云楞嚴會上又云兩頭子一日云義出豊𥝝儉生不孝於佛法中作麼生辨益便下座有有益代云何似者裏又云著著上堂云一塵一佛國一葉一釋迦德山何以卓牌於閙市也須喫却始得代云相似剎竿又云人面生又云入林不動草入水不動波投子因甚麼脚下五色索透関底試辨看以罪加之代云一家有事百家忙又云跳示眾云十方無壁落四靣亦無門古人向甚處見客或若道得接手句許尒天上天下芍藥花開菩薩靣椶櫚葉散夜叉頭代作女人拜出去上堂云世事悠悠不如山丘臥藤蘿下塊石枕頭堕在無事甲裏者般底有甚用處喚起了打便打有時云一切不是句瞎却時人眼還有出得底麼降尊就𤰞代云如如上堂云一切法皆是佛法瞞瞞頇頇非為正觀三生六十劫一切法即非一切法莾莾鹵鹵還同天皷三十三人賞个名安个是立个非向甚處見釋迦老子還會麼須菩提巖中宴坐以拄杖卓地一下云各請皈堂囓笋兔子示眾云父子親其居尊𤰞異其位金鍮誰分於衲僧分上是放開是捏聚分開也好或若辨得分半院與尒三十棒教誰喫一日云寳山到也湏開眼勿使茫茫空手廻便下座更請㪯一遍上堂機輪轉處作者猶迷在甚麼處千眼頓開與君相見眼睛突出竇問新到闍梨甚處人問訊不出手僧提起坐具放過一著落在第二竇云蝦跳不出斗無底笊籬僧云㪍跳雪竇門下不可竇便打有權有實僧云更㪍跳可惜許竇又打作家作家僧便走能幾个竇喚廻何不随後與三十棒僧便礼拜云觸忤和尚若是諸方又作麼生竇云我要者話行尒又走作什麼千个万个脫不得僧云已遍天下了也果然竇復打五下正眼豁開僧云有諸方在且待它時竇云尒只管喫棒無些子縫𦉑也竇喚第二人近前來甚處人云鼎州人它日自悔竇云敗也多少人蹉過僧云青天白日為蛇𦘕足竇云兩重公案諸人且道是權是實僧云恰是且緩緩竇以拄杖指云尒擬㪍跳為慈落草僧擬議却是你分上事竇亦打五下此棒也須雪竇自喫叅頭云者僧喫棒與某甲不同要抜本去竇一時喚近前臨行不妨掉臂其僧重便走亦同百步竇随後與一拄杖諸方榜樣上堂云孟常之門劒客何在不可待突良久也是非天子劍云點即不到便下座果然上堂云泡幻同無礙道什麼拈起拄杖云泡幻何處得來𥻘皴又擊一下云西天四七聖東土二三祖鼻孔眼睛𢝰穿在者裏傍提不要瞌睡漢皈堂馿擇濕處尿上堂云目前無法意在目前烏飛兔走不是目前法非耳目之所到皷鳴鐘響竇拈起拄杖云夾山老子甚處去也有麼有麼何不出來百草頭與大眾相見瞎又卓地一下云在者裏鈍致煞人復云咄者野狐精縮頭去便下座者一隊漢有甚麼了期僧問牛頭未見四祖時如何竇云恰漝麼阿呵呵僧云見後如何竇云三生六十劫退後退後僧礼拜竇長吁一聲一槌兩當上堂云一舉不載作麼生舉了舉得作麼生會千上堂云久雨不晴今日晴明煞眼裏衲僧曬了也未不免良久自云曬了也𠬧竇云収點復拈起拄杖著大眾定動無孔銕槌堪作甚麼用竇云無一个刢利打著迦葉門前便下座打趂清風随步示眾云譬若二龍爭珠有爪牙者不得或有衲僧問既是有爪牙者為作麼不得請大眾為雪竇下一轉語七穿八穴又云分開好代云俱又云也知和尚用這用上堂僧問羕和尚有言道士倒騎牛意旨如何獸心人靣竇云泥人眼赤斬釘截銕僧云不會果然竇云有甚麼了期便下座石火難及電光罔通上堂云天得一以清北斗南辰地得一以寧山高海闊衲僧得一無風浪起七尺拄杖三尺竹篦尒若辨得禍不入慎家之門天台東北角㪯僧問鏡清學人啐請師磨琢靣觜清云還得活也無堕在綣繢中學云若不活遭人恠笑又逐流鶯過短墻清云也是草裏漢放過一著落在第二竇云衲僧有此奇特事喝云道什麼若一人半个互相平展𢬘泥𭘧水古聖也不虚出來一迴相牽入火坑問羕和尚有言金剛鑄銕券意旨如何問得好竇云三頭六臂驚怖諸人云學人不會抓著痒處竇云擡上擡下手忙脚乱竇拈起拄杖突出靣前云人天交接兩得相見有釈迦老子麼太茫茫何擾擾誰穿來且放一邊拈來看三十三二十八敲落又在一處𠬧復云退後退後脚頭脚尾便起去諸人與麼去問羕古有言九九八十一意旨如何道著竇云金剛合掌風吹不入進云學人不會雪竇無分竇云皈依佛法僧臭骨自脫上堂云應緣而化物方便呼為智南來北往拈起拄杖喚作什麼諸人與麼去尒若道不得也許具一隻眼只除雪竇一个上堂㪯雪峯示眾云盡乾坤是个解脫門莫辜負諸聖眼把手拽不肯入柰何盡乾坤一僧云和尚恠某甲不得道得半邊一僧云用入作什麼拈得口了也竇云三个中有一人受救在以蝦為目忽若𢝰不辨明平地上有甚數兩鏃蒺梨便下座著也
