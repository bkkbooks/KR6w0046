  text: 築州太宰府萬𥝝崇福禪寺語録侍者宗貞編山門門頭實地個個踏著因甚諸人隨我入得喝一喝佛殿前佛後佛隱顯非一咄不因新長老證明知他一對無孔鐵土地堂護法先須識得主人公阿誰是主人公扣齒三下云東西南北一家風祖師堂者一隊老漢惜乎坐在者裏提起坐具云若不行此令誰敢得扶起方丈橫主丈云關中主能解與本分草料鳥觜薄舌莫胡亂供欵去主丈拈帖溫潤之文格調之氣直饒衲被蒙頭奚以讓為之義山門疏成言于語成語于言如何若何官不容針法座諸人喚作高廣座子山僧喚作者個座子何故一步云只為到與麼地師升座拈香云此一瓣香爇向爐中恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願龍永固玉葉芳次拈香云此一瓣香爇向爐中奉為征夷大將軍增崇祿算伏願高贊域中之德長提塞外之令又拈香云此一瓣香爇向爐中奉為大檀主築州大空門洎都督司馬增崇祿算伏願扇威風于千歲輝佛日于𠀍拈香云此香爇向爐中供養前住巨福名山建長禪寺先師敕諡圎通大應國師南浦和尚大禪師用酬法乳之恩師斂衣就座云明鏡當臺明珠歷掌要兮妍醜者直下來相見有麼有麼時有僧問緑樹隂濃夏日長樓臺倒影入池塘師云時節難逢僧云和尚辭帝里皇帝留之更向甚處通一路來師云鐵船水上浮僧云寰中天子敕聻師云誰不羕恩僧云與麼則杲日麗天清風匝地師云大方無外僧云記得保壽開堂三聖推出一僧意旨如何師云白雲𭰹處金龍躍僧云壽便打又作麼生師云碧波心裏玉兔驚僧云若忽有人推出一僧如何祗對師云風光可愛僧云者個且置今日還有禁足安居底道理麼師云大家在者裏僧云十五日結制則不問即今一時結去看師云𩂜𩂜緑楊堪繫馬僧云恩大難酬師云能有幾人僧禮拜師乃云𠀍尊拈花迦葉微笑君子愛財取之有道正法眼藏從此流通𮞏代傳持受虛接響激揚鏗鏘坐斷古今珠回玉轉八靣玲瓏迄于其大機圎應大道無方一寶一主擒縱擡搦收放明暗電轉星飛窮則變變則通青于藍寒于水聽教拔威音那畔蕭然空劫已前况亦清風明月多雅𫤭白雲流水寬詩緣四海九州雷動風行漁歌樵唱共賀太平正當與麼時人人禁足護生人人剋期取證皇恩佛恩一時報了底事又作麼生擊拂子云版遠奏堯天闊物呈祥樂聖情復舉三聖道我逢人即出出則不為人𫤭化道我逢人則不出出即便為人師云二大老可謂漆隱處黑朱隱處赤若是山僧底天平地平卓主丈下座當晚小參僧問三月安居九旬禁足則不問遠離花洛親到嶽峰一句如何師云八角磨盤空裏走僧云和尚住此山以何安衆師云山色夕陽時泉聲中夜後僧云與麼則大衆飽德去也師云無限清風來未休僧云德山小參不答話有問話者三十棒意旨如何師云去得來不得僧云趙州小參要答話有問話者置將一問來又作麼生師云來得去不得僧云今夜小參要答話不要答話耶師云出頭天外看誰是我般人僧云三大老用莫止一般麼師云教你休也不肯休僧云若如此則一即三三即一師云吽吽僧云學人今夜小出大遇便禮拜師云撒手那邊去乃云今夜要與大衆有個識靣之話各各切冝起倒分明陵王溪畔此君亭邊諸人知有未得做主崇福區宇件件數目山僧做主未辨大毫既一其居為甚受用不同還會麼所以道欲識佛性義當觀時節因緣明朝賴是結制安居之辰個個成熟慧身坐底立底築著磕著自然不得孤負者個便卓主丈一下復舉雲門因有官問佛法如水中月是也無門云清波無透路師拈云以答見問問最可以問見答答未奇且道誵訛在甚處具眼禪流請辨緇素看次日上堂我個一衆與尋常不同跳出金剛圈吞透栗𣗥蓬激電神機雲飛飈到既而如此今朝因甚要行不行要住不住還會麼擊拂子云塌薩阿竭二千𥝝五月且上堂僧問聲前薦得未是作家喝下羕當猶是鈍漢為什麼如此師云石壓笋斜出岸懸花倒生進云猶是學人疑師云鳳林吒之進云記得僧問投子如何是十身調御投子下禪床立意旨如何師云頂上無骨進云又問凡聖相去多少投子亦下禪床立意在那裏師云頷下有鬚進云若有人問如何是十身調御如何祗對師云眼中童子靣前人進云上來一一指示分明為人底一句又作麼生師云三十𥝝後自悔去亦不定乃云崇福有三訣若參得第一訣許你拄杖頭上挑日月若參得第二訣不妨拂子頭上打筋斗若參得第三訣我且問你山前麥熟也未端午謝檀家補寺齋上堂僧問今朝五月端午不用書符咒土請師現量法門一句直下至論師云一峰雲片片雙澗水潺潺進云家無白澤之圖又作麼生師云將謂要問話漢進云善財撞著文殊底時節且置天澤三轉語還許學人咨參也無師云鑽之是仰之是進云己眼未明底因甚將虛空作布袴著師云脛無毛股無肉進云劃地為牢底因甚透者個不過師云腳下荊𣗥深數丈進云入海算沙底因甚針鋒頭上翹足師云覺築著你鼻孔麼進云恁麼則金殿談禪大恱皇情嶽峰聲道奔走衲子也未為分外在師喝云非阿你境界進云錦上鋪花又一重師云咦乃云端午天中節諸方盡呪土書壁以消妖怪認採藥模樣落草以作伎倆爭如我者裏有不忘靈山付囑之人忽展妙術之手拔貧做富一衆個個石人之機鐵漢之用風吹不入水灑不著諸人要見此人麼卓主丈云切忌當靣諱却和泉和尚至上堂僧問長松嶺頭風𩖼𩖼飛瀑岸前水潺潺現成公案大難大難如何履踐師云好向大難履踐進云恁麼則薰風自南來殿閣生微涼師云認驢鞍橋作阿爺下頷進云和尚有三訣一一許咨參也無師云何妨問將來進云若參得第一訣許你拄杖頭上挑日月意旨作麼生師云虛空迸裂進云若參得第二訣不妨拂子頭上打筋斗又如何師云山嶽起舞進云若參得第三訣我且問你山前麥熟也未意在那裏師云眼睛鳥律律進云者個三訣必竟明得什麼邊事師云金香爐下鐵崑崙乃舉𫤭化見同參來喝底公案師云古人只要就價高欠篤其管賞之義崇福今日得和泉和尚訪事事自然函蓋相應何故擊拂子云覔火和煙得擔泉𭘧月皈退院上堂衲子從來無定迹天涯海角任情遊一毫頭上辭華洛三鼓聲中出九州崇福語録終拈古舉臨濟上堂云一人在孤峯頂上無出身之路一人在十字街頭亦無向背那個在前那個在後不作維摩詰不作傅大士珍重師云將謂龍頭蛇尾元來只是蛇尾龍頭雖然如是深領指示舉欽山同嵓頭雪峰到德山乃問天皇也恁麼道龍潭也恁麼道未審德山作麼生道德山云汝試舉天皇龍潭底看欽山擬議德山便打欽山㷌延壽堂云是則是打我太煞嵓頭云你與麼他後莫道見德山師云可惜許舉雲門上堂云遇人即鼻孔遼天師云堪笑言老漢赤腳上刀山拔毛入火聚其爭奈解笑底也少舉僧問雲門如何是透法身句門云北斗裏藏身師云衆生若非法身即非衆生法身若非衆生亦非法身透之一字因誰致淂直饒是北斗裏藏身可謂修羅三目似伊字舉雪竇示衆云譬若二龍爭珠有爪牙者不淂或有衲僧問既是有爪牙者為什麼不淂請大衆為雪竇下一轉語師云其貧不學儉富不學奢此是俗漢之陋韻却可謂知言也且問諸人二龍爪牙孰與雪竇爪牙他既爭珠不淂之這老爭個什麼而不淂請各下一點語舉趙州問投子大死底人却活時如何投子云不許夜行投明須到師云趙州移步不移身投子移身不移步雖然羕虛接響爭奈它後舉淂者少舉臨濟令侍者傳語德山侍云德山要打人濟云汝但去待伊拈棒接住與一送管取不打你侍依所教果然不打㷌舉似臨濟濟云我從來疑著者漢師云蓋是作者動止神鬼難測一人向海枯終見底處坐斷千聖之頂𩕳一人向人死不知心處瞎却衲子之眼睛咦可貴可賤舉雪竇一日問僧你浴未僧云某甲此生不浴竇云你不浴個什麼僧云今日被和尚勘破竇云賊不打貧兒家師拈云雪竇老漢才兼文武出將入相今日遭拈出一口鉛刀子高豎降旗諸人要識雪竇麼一種是聲無限意有堪聽有不堪聽舉風穴因僧問如何是清涼山中主穴云一句不遑無著問迄今猶作野盤僧師云古人恁麼答褒清涼主貶清涼主若是道褒因什麼有不遑無著問之句若也道貶它有個什麼過道不褒不貶風穴何必有恁麼語話無端觸著獅子哮吼舉臺山路上有一婆子接待凡有僧問臺山路甚麼去婆云驀直去僧才去婆云好個師僧又與麼去如是既久遊僧傳到趙州州聞淂云待我去勘破他遂去問臺山路婆隨例云驀直去州才行婆又云好個師僧又與麼去州回云我勘破婆子了也師云盡謂日下挑孤燈殊不知失錢遭罪舉臨濟上堂云有一人論劫在途中不離家舍有一人離家舍不在途中那個合受人天供養便下座師云這老漢威容嚴肅衲子到者無不失其舉措大家寢默俯仰過日不見道衆人之唯唯不如一士之諤諤若是人天供養要擇取一人拈古竟頌古淨居于窗牖中義手玉囦鑑月不期秋夜靜方知波浪別從此相逢路似迷崔嵬檀特硬如鐵爾時迦葉告諸比丘佛已茶毗金剛舍利非我事我宜當結集正法無令斷絶列三析半信何通回首白雲眼力空雞足峰前未去多羅葉上動悲風行思禪師問希遷云汝什麼處來云曹溪來思乃舉拂子云曹溪還有這個麼云非但曹溪西天亦無思云子莫曾到西天否云若到即有也思云未在更道云和尚也須道取一半莫全靠舉人思云不辭向汝道恐已後無人羕當明暗雙雙絶對揚愁人未斷愁腸金毛獅子解踞地冤苦蒼天又一場僧問大隨劫火洞然大千俱壞未審這個壞不壞隨云壞僧云與麼則隨他去也隨云隨他去劫火隨他喚不回遠離西蜀去還來大千揔者僧眼古佛光中笑口開百丈懷海一日謂衆云佛法不是小事老僧昔被馬大師一喝直淂三日耳聾眼𪾲黃蘗聞舉吐舌丈云子已後莫羕嗣馬祖蘗云不然今日因師舉淂見馬祖大機大用然且不識馬祖若嗣馬祖喪我兒孫丈云如是如是一喝耳聾天地黑當機吐舌生荊𣗥羕虛接響意難論兩兩三三好動保福長慶遊山次福以手指云只這裏便是妙峰頂慶云是即是可惜許雪竇著語云今日共這漢遊山什麼復云百千年後不道無只是少後舉似鏡清清云若不是孫公便見髑髏遍野妙峰孤頂難人到只看白雲飛又松檜蒼歷幾歲莫教巖畔鳥聲稀僧問巴陵如何是提婆宗巴陵云銀碗裏盛雪提婆宗難分節誰道銀碗裏盛雪大地山河一風人間天上蕭灑絶盤山垂語云三界無法何處求心千峰雨霽露光冷月落松根蘿屋前擬寫間此時意一溪雲鎖水潺巖頭問僧什麼處來僧云西京來頭云黃巢過後還收淂劒麼僧云收淂頭引頸近前云㘞僧云師頭落也頭呵呵大笑僧後到雪峰峰問什麼處來僧云巖頭來峰云有何言句僧舉前話雪峯打三十趂出黃巢過後劒難收提去提來傷手憂不是山藤三十下梵天餘血五湖流雲門垂語云古佛與露柱相交是第幾機自代云南山起雲北山下雨古佛光中第幾機南山雲外少人知千溪日晚樵歌路去來兮來去仰山問三聖汝名什麼聖云慧寂山云慧寂是我聖云我名慧然仰山呵呵大笑師著語云什麼處去也煦日影中雪霽春梅腮栁靣鬪芳新詩緣風無限意獨許苦吟野外人雲門垂語云乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上宇宙乾坤同一寶燈籠佛殿形山中青松雪霽岩勢晚寒月風清溪畔空禾山垂語云習學謂之聞絶學謂之鄰過此二者是為真過僧出問如何是真過山云解打鼓問如何是真諦山云解打鼓問即心即佛即不問如何是非心非佛山云解打鼓問向上人來如何接山云解打鼓天上星地下木覿機那肯涉離微明歷𠀍無別物猛烈身心更不疑仰山問僧近離甚處僧云廬山仰山云曾遊五老峰麼僧云不曾遊仰山云闍梨不曾遊山雲門云此語皆為慈悲之故有落草之談看落草不遊山的信何通千里關敲唱當鋒見禪恱一圎空裏二三三外道問佛不問有言不問無言世尊良久外道讚歎云𠀍尊大慈大悲開我迷雲令我淂入外道去後阿難問佛云外道有何所證而言淂入佛云如𠀍良馬見鞭影而行不問有言異道事鐵山當靣勢崔嵬孤峰雲散千溪月鞭影追風直下來魯祖山寶雲禪師因僧問如何是言不言雲云汝口在什麼處僧云無口雲云將什麼喫飯僧無對洞山代云他不飢喫什麼飯超然一句錯流布強弄爪牙未作家簫後路頭端的別誰知高處有風波溈山因仰山問如何是西來意溈云大好燈籠仰云莫只這個便是麼溈云這個是什麼仰云大好燈籠溈云果然不識機意交馳何處去陳雲千里鎖重關大家問著不相識堪笑古風匝地寒江州龍雲臺禪師因僧問如何是祖師西來意臺云老僧昨夜欄裏失却牛昨夜欄裏失却牛不風流處也風流枯禪無限喚淂作祖意西來特地酬南泉一日東西兩堂爭貓南泉見遂提起云道淂即不斬衆無對南泉斬却貓為兩假南泉復舉前話問趙州州便脫草鞋于頭上戴出泉云子若在恰救得貓兒兩堂爭處南泉斷王老放時趙老收頭上草鞋多少重白雲流水共悠僧伽難提知衆生慢乃曰𠀍尊在日𠀍界平正無有丘陵江河溝洫水悉甘美草木滋茂國土豐盈無八苦行十善自雙樹示八百餘𥝝𠀍界丘墟樹木枯悴人無至信正念輕微不信真如唯愛神力言訖以右手漸展入地至金剛輪際取甘露水以琉璃器持至會所大衆見之即時欽慕悔過作禮師著語云拈淂也未日暮雲晴空眼界清風况是草離離松根石上與誰月到中峰猶未迦耶舍多尊者領徒到一舍舍主鳩摩羅多問云是何徒衆尊者云是佛弟子羅多聞佛號心神悚然即時閉戶尊者良久自扣其門羅多云此舍無人尊者云答無者誰羅多聞語知是異人遽開關延接踏斷春風千萬峰蒼苔青薜鎖靈蹤落花啼鳥夕陽裏雲合雲開晚寺鐘𣑽摩淨德云弟子𮕱老不能事師願捨次子以令出家退己進人無可比百千年後有誰知室羅城畔金水上古佛放光動地時不如蜜多聞偈再啓祖云法衣宜可傳授祖云此衣為難故假以證明汝身無難何假其衣蜜多聞語作禮而退月高松頂孤灮冷風弄殘雲秋意寬四海涓涓百川落琉璃殿上夜遊闌玄沙示衆云諸方老宿盡道接物利生忽遇三種病人作麼生接患盲者拈槌竪拂它又不見患聾者語言三昧它又不聞患啞者教伊又不得且作麼生接若接此人不得佛法無靈驗僧請益雲門門云汝禮拜著僧禮拜起門以拄杖挃僧退後門云汝不是患盲復喚近前來僧近前門云汝不是患聾乃云還會麼僧云不會門云汝不是患啞僧于此有省盲聾瘖啞誰能接退後近前指下明多向珍候沉動不知三種一毛病翠岩夏末示衆云一夏已來與兄弟東西話看翠岩眉毛在麼保福云作賊人心虛長慶云生也雲門云關偷眼才開先下手眉毛生也月方明雲門關子重鎖直至而今絶夜行鹽官一日喚侍者云與我將犀牛扇子來侍者云扇子破了也官云扇子既破還我犀牛兒來侍者無對投子云不辝將出恐頭角不全雪竇拈云我要不全底頭角石霜云若還和尚即無也雪竇拈云犀牛兒猶在資福畫一圎相于中書一牛字雪竇拈云適來為什麼不將出保福云和尚𥝝尊別請人好雪竇拈云可惜勞而無功犀牛扇子清風起坐斷清風出氣難破了當年重用去和煙搭在玉欄干雪峰住庵時有兩僧來禮拜峰見來以手托庵門放身出云是什麼僧亦云是什麼峰低頭庵僧後到岩頭頭問什麼𩂜來僧云嶺南來頭云曾到雪峯麼僧云曾到頭云有何言句僧舉前話頭云他道什麼僧云他無語低頭庵頭云噫我當初悔不向他道末後句若向伊道末後句天下人不奈雪老何僧至夏末再舉前話請益頭云何不早問僧云未敢容易頭云雪峯雖與我同條生不與我同條死要識末後句只這是同條生不同死拈却明頭收暗頭此放身庵去至今簾外鬼神愁溈山五峯雲岩同侍立百丈百丈問溈山併卻咽喉唇吻作麼生道溈山云却請和尚道丈云我不辝向汝道恐已後喪我兒孫復問五峰峰云和尚也須併却丈云無人斫額汝又問雲岩岩云和尚有也未丈云喪我兒孫東街栁色和煙翠西巷桃花相映紅幾度春風晚鐘裏遊人著意到寥空南泉參百丈涅槃和尚丈問從上諸聖還有不為人底法麼泉云有丈云作麼生是不為人底法泉云不是心不是佛不是物丈云了也泉云某甲只與麼和尚作麼生丈云我又不是大善知識爭知有不泉云某甲不會丈云我太煞為你了也從上為人事不容老胡知寒雲抱幽石霜月照清池大隨問僧什麼去僧云禮普賢去隨舉拂子云文殊普賢揔在這裏僧作圎相拋向背後乃展兩手隨云侍者取一帖茶與這僧遠聞近見一賔主半暗半明孰與揚若是個中全用去普賢特地逐亡羊三角總印云若論此事眨上眉毛早已蹉過也麻谷便問眨上眉毛即不問如何是此事角云蹉過也谷乃掀禪床角打之谷無語地獄天堂阿剌剌機關直下沒應把姦生多變卻難得雙放雙收過新羅維摩詰問文殊師利何等是菩薩入不二法門文殊師利云如我意者于一切法無言無無示無識離諸問答是為入不二法門代維摩打出于是文殊師利問維摩詰我等各自已仁者當何等是菩薩入不二法門維摩默然代文殊乃喝不二法門何再二千三一齊來當𥝝妙吉親用去扶淂病翁使口開僧問趙州初生孩子還具六識也無州云急水上打毬子僧復問投子急水上打毬子意旨如何子云念念不停流六識問來難識破趙州老大只麼酬可憐同道實頭漢道道念念不停流京兆米和尚因有老𪧐問月中斷井索時人喚作蛇未審七師見佛喚作什麼米云若有佛見即同衆生𪧐云千年桃核師別米和尚驀口一拳斷井索子月中為蛇衝氣吐毒跳沫馳波生兮佛兮齊難話多劫潛微滅磨不滅磨紫金光聚照山河雲門云古人道人人盡有光明在看時不見暗昏昏作麼生是光明代云厨庫三門又云好事不如無九天雲淨衆星微風𫤭何餘一句詩今夜與君無事去時人喚作那斯祁三門厨庫是光明見不見時難辨別好事元來不如無烏雞半夜啄生鐵馬大師不安院主問和尚近日尊位如何大師云日靣佛月靣佛日靣佛月靣佛三三兩兩太無端二十年來苦辛客照絶精微見大難僧問雲門如何是超佛越祖之談門云胡餅覿靣胡餅難下口摩斯吒徒入瀾中者回休吐黑雲霧寥廓天邊無白虹百丈惟政禪師一日謂衆云汝為我開田我為汝大義僧衆開田竟請和尚大義百丈便展開兩手閃電激怒雷馳眼裏耳裏個覿機昨夜三山三跳後北辰鬼谷作擬議作擬議七佛祖師曾未知平田普岸禪師因有僧到參平田打一拄杖其僧近前把住拄杖平田云老僧適來造次僧卻打平田一拄杖平田云作家作家僧禮拜平田把住云是闍梨造次僧大笑平田云這個師僧今日大敗也一向一背不易親互換韜略鼓旗別干將劒未斬甲鍪夏服箭何穿七札鬼哭神悲崖崩石裂還顛蹶師僧今日大敗大慈山寰中禪師住庵時南泉至問如何是庵中主寰云蒼天泉云蒼天且置如何是庵中主寰云會即便會莫忉南泉拂袖而出庵中主見還難句裏藏身太無端偷眼暫時休也未夜深誰共過關山僧問藥山平田淺草麈鹿成群如何射淂麈中麈山云看箭僧放身便倒山云侍者拖出這死漢僧便走山云弄泥團漢有什麼限雪竇拈云三步雖活五步須死麈中麈走淂三步五步未堪趂虎兒趂兒獵人徒莫覔坤維慧忠國師與紫璘供奉論議既升座供奉云請師立義某甲破忠云立義竟供奉云是什麼義忠云果然不見非公境界便下座祖風逈振機輪轉學海瀾忙自沒頭大鵬一舉九里籬邊燕雀空啾僧問洞山如何是佛山云麻三斤木落岩岡鋒骨泠月斜禪石曉難開寒雲伴來間不徹飛瀑從他起忽雷六祖云不思善不思𢙣正當恁麼時還明上座本來靣目來五步欵行三步疾莫教正眼頂門開悠不見𢈔嶺路腳後腳前去來霍山和尚聞祕魔岩和尚凡有僧到禮拜以木義義霍山一日遂往訪之才見不禮拜直入祕魔懷裏祕魔拊霍山背三下霍山起拍手云此老一千里地賺我來便回當機提覿靣疾取次用來若為宗個個一千應走卻草鞋跟斷起清風梁武帝問逹磨大師如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識廓然不識有幾人古路橫行鎖嶺煙此少林深雪裏斷臂刀下別踈親風穴垂語云若立一塵家國𫤭盛野老嚬蹙若不立一塵家國喪亡野老謳歌雪竇拈柱杖云還有同生同死底衲僧麼嚬蹙謳歌在一塵同生同死慿何人紅霞碧靄籠高低芳草野花一樣春南嶽懷讓遣一僧到馬祖去云但問作麼生伊道底言語記將來僧去一如懷讓旨回謂懷讓云馬祖云自從胡亂後三十年不曾闕鹽醬讓然之朝三千暮八百個個放過一著生鐵如和土壤大冶可解拈却頌古竟
