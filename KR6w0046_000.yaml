  text: 筑州太宰府萬𥝝崇福禪寺語錄侍者宗貞編山門門頭實地个个踏著因甚諸人随我入得喝一喝佛殿前佛後佛隱顕非一咄不因新長老證明知佗一對无孔銕土地堂護法先湏識得主人公阿誰是主人公扣齒三下云東西南北一家風祖師堂者一隊老漢惜乎坐在者裏提起坐具云若不行此令誰敢得扶起方丈橫主丈云関中主能解与本分草料鳥觜薄舌莫胡乱供欵去主丈拈帖溫潤之文格調之氣直饒衲被蒙頭奚以讓為之義山門䟽成言扵語成語扵言如何若何官不容針法座諸人喚作高廣座子山僧喚作者个座子何故一步云只為到与麼地師陞座拈香云此一瓣香𤑔向炉中恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願龍永固玉葉芳次拈香云此一瓣香𤑔向炉中奉為征夷大將軍增崇祿筭伏願高賛域中之徳長提塞外之令又拈香云此一瓣香𤑔向炉中奉為大檀主筑州大空門洎都督司馬增崇祿筭伏願扇威風扵千歲輝佛日扵𠀍拈香云此香𤑔向炉中供養前住巨福名山建長禪寺先師敕諡圎通大應國師南浦和尚大禪師用酧法乳之恩師斂衣就座云明鏡當臺明珠歷掌要兮妍醜者直下来相見有麼有麼時有僧問綠樹隂濃夏日長樓臺倒影入池塘師云時節難逢僧云和尚辞帝里皇帝留之更向甚処通一路来師云銕船水上浮僧云寰中天子敕聻師云誰不羕恩僧云与麼則杲日麗天清風匝地師云大方无外僧云記得保壽開堂三聖推出一僧意㫖如何師云白雲𭰹処金龍躍僧云壽便打又作麼生師云碧波心裏玉兔驚僧云若忽有人推出一僧如何祗對師云風光可愛僧云者个且置今日還有禁足安居底道理麼師云大家在者裏僧云十五日結制則不問即今一時結去看師云𩂜𩂜綠楊堪繫馬僧云恩大難酧師云能有幾人僧礼拜師乃云𠀍尊拈花迦葉微笑君子愛財取之有道正法眼蔵從此流通𮞏代傳持受虚接響激揚鏗鏘坐断古今珠回玉轉八靣玲瓏迄于其大機圎應大道无方一寳一主擒縦擡搦収放明暗電轉星飛窮則変変則通青扵藍寒扵水聽教拔威音𨚗畔蕭然空劫已前况亦清風明月多雅𫤭白雲流水寬詩緣四海九州雷動風行漁歌樵唱共賀太平正當与麼時人人禁足護生人人剋期取證皇恩佛恩一時報了底事又作麼生擊拂子云版遠奏堯天闊物呈祥樂聖情復㪯三聖道我逢人即出出則不為人𫤭化道我逢人則不出出即便為人師云二大老可謂漆隱処黑朱隱処赤若是山僧底天平地平卓主丈下座當晚小參僧問三月安居九旬禁足則不問遠離花洛親到岳峰一句如何師云八角磨盤空裏走僧云和尚住此山以何安眾師云山色夕陽時泉声中夜後僧云与麼則大眾飽徳去也師云无限清風來未休僧云徳山小參不荅話有問話者三十棒意㫖如何師云去得来不得僧云趙州小參要荅話有問話者置將一問来又作麼生師云来得去不得僧云今夜小參要荅話不要荅話耶師云出頭天外看誰是我般人僧云三大老用莫止一般麼師云教你休也不肯休僧云若如此則一即三三即一師云吽吽僧云學人今夜小出大遇便礼拜師云撒手𨚗邊去乃云今夜要与大眾有个識靣之話各各切冝起倒分明陵王溪畔此君亭邊諸人知有未得做主崇福區宇件件數目山僧做主未辨大毫既一其居為甚受用不同還會麼所以道欲識佛性義當觀時節因緣明朝頼是結制安居之辰个个成熟慧身坐底立底築著磕著自然不得孤負者个便卓主丈一下復㪯雲門因有官問佛法如水中月是也无門云清波无透路師拈云以荅見問問最可以問見荅荅未奇且道誵訛在甚処具眼禪流請辨緇素看次日上堂我个一眾与尋常不同跳出金剛圈吞透栗𣗥蓬激電神機雲飛飈到既而如此今朝因甚要行不行要住不住還會麼擊拂子云塌薩阿竭二千𥝝五月且上堂僧問声前薦得未是作家喝下羕當猶是鈍漢為什麼如此師云石壓笋斜出岸懸花倒生進云猶是學人疑師云鳳林吒之進云記得僧問投子如何是十身調御投子下禪床立意旨如何師云頂上无骨進云又問凢聖相去多少投子亦下禪床立意在𨚗裏師云頷下有鬚進云若有人問如何是十身調御如何祗對師云眼中童子靣前人進云上来一一指示分明為人底一句又作麼生師云三十𥝝後自悔去亦不定乃云崇福有三訣若參得第一訣許你拄杖頭上挑日月若參得第二訣不妨拂子頭上打筋斗若參得第三訣我且問你山前麦熟也未端午謝檀家補寺齋上堂僧問今朝五月端午不用書符咒土請師現量法門一句直下至論師云一峰雲片片雙磵水潺潺進云家无白澤之圖又作麼生師云將謂要問話漢進云善財撞著文殊底時節且置天澤三轉語還許學人咨參也无師云鑽之是仰之是進云己眼未明底因甚將虚空作布袴著師云脛无毛股无肉進云劃地為牢底因甚透者个不過師云脚下荊𣗥深數丈進云入海筭沙底因甚針鋒頭上翹足師云覺築著你鼻孔麼進云恁麼則金殿譚禪大恱皇情岳峰聲道奔走衲子也未為分外在師喝云非阿你境界進云錦上鋪花又一重師云咦乃云端午天中節諸方尽呪土書壁以消妖怪認採藥模樣落草以作伎倆爭如我者裏有不忘靈山付嘱之人忽展妙術之手拔貧做富一眾个个石人之機銕漢之用風吹不入水洒不著諸人要見此人麼卓主丈云切忌當靣諱却和泉和尚至上堂僧問長松嶺頭風𩖼𩖼飛瀑岸前水潺潺現成公案大難大難如何履踐師云好向大難履踐進云恁麼則薰風自南来殿閣生微凉師云認馿鞍橋作阿爺下頷進云和尚有三訣一一許咨參也无師云何妨問將来進云若參得第一訣許你拄杖頭上挑日月意旨作麼生師云虚空迸裂進云若參得第二訣不妨拂子頭上打筋斗又如何師云山岳起舞進云若參得第三訣我且問你山前麦熟也未意在𨚗裏師云眼睛鳥律律進云者个三訣必竟明得什麼邊事師云金香炉下銕崑崙乃㪯𫤭化見同參來喝底公案師云古人只要就價高欠䔍其管賞之義崇福今日得和泉和尚訪事事自然函蓋相應何故擊拂子云覔火和煙得擔泉𭘧月皈退院上堂衲子從来无定迹天涯海角任情遊一毫頭上辤華洛三皷聲中出九州崇福語錄終拈古㪯臨濟上堂云一人在孤峯頂上无出身之路一人在十字街頭亦无向背那个在前那个在後不作維摩詰不作傅大士珍重師云將謂龍頭蛇尾元来只是蛇尾龍頭雖然如是深領指示㪯欽山同嵓頭雪峰到徳山乃問天皇也恁麼道龍潭也恁麼道未審徳山作麼生道徳山云汝試㪯天皇龍潭底看欽山擬議徳山便打欽山㷌延壽堂云是則是打我太煞嵓頭云你与麼佗後莫道見徳山師云可惜許㪯雲門上堂云遇人即鼻孔遼天師云堪笑言老漢赤脚上刀山抜毛入火聚其爭柰解笑底也少㪯僧問雲門如何是透法身句門云北斗裏蔵身師云眾生若非法身即非眾生法身若非眾生亦非法身透之一字因誰致淂直饒是北斗裏蔵身可謂修羅三目佀伊字㪯雪竇示眾云譬若二龍爭珠有爪牙者不淂或有衲僧問既是有爪牙者為什麼不淂請大眾為雪竇下一轉語師云其貧不學儉富不學奢此是俗漢之陋韻却可謂知言也且問諸人二龍爪牙孰与雪竇爪牙佗既爭珠不淂之這老爭个什麼而不淂請各下一點語㪯趙州問投子大死底人却活時如何投子云不許夜行投明湏到師云趙州移步不移身投子移身不移步雖然羕虚接響爭柰它後㪯淂者少㪯臨濟令侍者傳語徳山侍云徳山要打人濟云汝但去待伊拈棒接住与一送管取不打你侍依所教果然不打㷌㪯似臨濟濟云我従来疑著者漢師云盖是作者動止神鬼難測一人向海枯終見底処坐断千聖之頂𩕳一人向人死不知心処瞎却衲子之眼睛咦可貴可賤㪯雪竇一日問僧你浴未僧云某甲此生不浴竇云你不浴个什麼僧云今日被和尚勘破竇云賊不打貧兒家師拈云雪竇老漢才兼文武出將入相今日遭拈出一口鈆刀子高豎降旗諸人要識雪竇麼一種是聲无限意有堪聽有不堪聽㪯風穴因僧問如何是清涼山中主穴云一句不遑无著問迄今猶作野盤僧師云古人恁麼荅褒清涼主貶清涼主若是道褒因什麼有不遑无著問之句若也道貶它有个什麼過道不褒不貶風穴何必有恁麼語話无端觸著獅子哮吼㪯臺山路上有一婆子接待凢有僧問臺山路甚麼去婆云驀直去僧才去婆云好个師僧又与麼去如是既久游僧傳到趙州州聞淂云待我去勘破佗遂去問臺山路婆随例云驀直去州才行婆又云好个師僧又与麼去州回云我勘破婆子了也師云尽謂日下挑孤灯殊不知失錢遭罪㪯臨濟上堂云有一人論劫在途中不離家舎有一人離家舎不在途中那个合受人天供養便下座師云這老漢威容嚴肅衲子到者无不失其㪯措大家寑默俛仰過日不見道眾人之唯唯不如一士之諤諤若是人天供養要擇取一人拈古竟頌古淨居扵䆫牖中义手玉囦鑑月不期秋夜靜方知波浪別従此相逢路似迷崔嵬檀特硬如銕尒時迦葉告諸比丘佛已茶毗金剛舎利非我事我宜當結集正法无令断絕列三析半信何通回首白雲眼力空鷄足峰前未去多羅葉上動悲風行思禪師問希遷云汝什麼処来云曹谿来思乃㪯拂子云曹谿還有這个麼云非但曹谿西天亦无思云子莫曾到西天否云若到即有也思云未在更道云和尚也湏道取一半莫全靠㪯人思云不辤向汝道恐已後无人羕當明暗雙雙絕對揚愁人未断愁腸金毛獅子解踞地冤苦蒼天又一場僧問大随劫火洞然大千俱壞未審這个壞不壞随云壞僧云与麼則随佗去也随云随佗去劫火随佗喚不回遠離西蜀去還来大千揔者僧眼古佛光中笑口開百丈懷海一日謂眾云佛法不是小事老僧昔被馬大師一喝直淂三日耳聾眼𪾲黃蘗聞㪯吐舌丈云子已後莫羕嗣馬祖蘗云不然今日因師㪯淂見馬祖大機大用然且不識馬祖若嗣馬祖䘮我兒孫丈云如是如是一喝耳聾天地黑當機吐舌生荊𣗥羕虚接響意難論兩兩三三好動保福長慶遊山次福以手指云只這裏便是妙峰頂慶云是即是可惜許雪竇著語云今日共這漢遊山什麼復云百千年後不道无只是少後㪯佀鏡清清云若不是孫公便見髑髏徧野妙峰孤頂難人到只看白雲飛又松檜蒼歷幾歲莫教巖畔鳥聲稀僧問巴陵如何是提婆宗巴陵云銀椀裏盛雪提婆宗難分節誰道銀椀裏盛雪大地山河一風人間天上蕭洒絕盤山垂語云三界无法何処求心千峰雨霽露光冷月落松根蘿屋前擬冩閑此時意一溪雲鎖水潺巖頭問僧什麼処来僧云西京来頭云黃巢過後還收淂劒麼僧云收淂頭引頸近前云㘞僧云師頭落也頭呵呵大笑僧後到雪峰峰問什麼処来僧云巖頭来峰云有何言句僧㪯前話雪峯打三十趂出黃巢過後劒難收提去提来傷手憂不是山藤三十下梵天餘血五湖流雲門垂語云古佛与露柱相交是第幾機自代云南山起雲北山下雨古佛光中第幾機南山雲外少人知千溪日晚樵歌路去来兮来去仰山問三聖汝名什麼聖云慧寂山云慧寂是我聖云我名慧然仰山呵呵大笑師著語云什麼処去也煦日影中雪霽春梅腮栁靣闘芳新詩緣風无限意獨許苦吟野外人雲門垂語云乹坤之內宇宙之間中有一寳祕在形山拈燈籠向佛殿裏將三門来燈籠上宇宙乹坤同一寳燈籠佛殿形山中青松雪霽岩勢晚寒月風清溪畔空禾山垂語云習斈謂之聞絕斈謂之隣過此二者是為真過僧出問如何是真過山云解打皷問如何是真諦山云解打皷問即心即佛即不問如何是非心非佛山云解打皷問向上人来如何接山云解打皷天上星地下木覿機那肯涉離微明歷𠀍无別物猛烈身心更不疑仰山問僧近離甚処僧云廬山仰山云曾遊五老峰麼僧云不曾遊仰山云闍梨不曾遊山雲門云此語皆為慈悲之故有落草之談看落草不遊山的信何通千里関敲唱當鋒見禪恱一圎空裏二三三外道問佛不問有言不問无言世尊良久外道讚歎云𠀍尊大慈大悲開我迷雲令我淂入外道去後阿難問佛云外道有何所證而言淂入佛云如𠀍良馬見鞭影而行不問有言異道事銕山當靣勢崔嵬孤峰雲散千溪月鞭影追風直下来魯祖山寳雲禪師因僧問如何是言不言雲云汝口在什麼処僧云无口雲云將什麼喫飯僧无對洞山代云佗不飢喫什麼飯超然一句錯流布強弄爪牙未作家簫後路頭端的別誰知高処有風波溈山因仰山問如何是西来意溈云大好燈籠仰云莫只這个便是麼溈云這个是什麼仰云大好燈籠溈云果然不識機意交馳何処去陣雲千里鎻重関大家問著不相識堪笑古風匝地寒江州龍雲臺禪師因僧問如何是祖師西来意臺云老僧昨夜欄裏失却牛昨夜欄裏失却牛不風流処也風流枯禪无限喚淂作祖意西来特地酧南泉一日東西兩堂爭猫南泉見遂提起云道淂即不斬眾无對南泉斬却猫為兩叚南泉復㪯前話問趙州州便脫草鞋扵頭上戴出泉云子若在恰救得猫兒兩堂爭処南泉断王老放時趙老收頭上草鞋多少重白雲流水共悠僧伽難提知眾生慢乃曰𠀍尊在日𠀍界平正无有丘陵江河溝洫水悉甘美草木滋茂國土豐盈无八苦行十善自双樹示八百餘𥝝𠀍界丘墟樹木枯悴人无至信正念輕微不信真如唯愛神力言訖以右手漸展入地至金剛輪際取甘露水以琉璃噐持至會所大眾見之即時欽慕悔過作礼師著語云拈淂也未日暮雲晴空眼界清風况是草離離松根石上与誰月到中峰猶未迦耶舎多尊者領徒到一舎舎主鳩摩羅多問云是何徒眾尊者云是佛弟子羅多聞佛号心神悚然即時閉戶尊者良久自扣其門羅多云此舎无人尊者云荅无者誰羅多聞語知是異人遽開関延接踏断春風千萬峰蒼苔青薜鎻靈蹤落花啼鳥夕陽裏雲合雲開晚寺鐘𣑽摩淨德云弟子𮕱老不能事師願捨次子以令出家退己進人无可比百千年後有誰知室羅城畔金水上古佛放光動地時不如蜜多聞偈再啟祖云法衣宜可𫝊授祖云此衣為難故假以證明汝身无難何假其衣蜜多聞語作礼而退月高松頂孤灮冷風弄殘雲秌意寬四海㳙㳙百川落琉璃殿上夜遊闌玄沙示眾云諸方老宿尽道接物利生忽遇三種病人作麼生接患盲者拈槌竪拂它又不見患聾者語言三昧它又不聞患瘂者教伊又不得且作麼生接若接此人不得佛法无靈驗僧請益雲門門云汝礼拜著僧礼拜起門以拄杖挃僧退後門云汝不是患盲復喚近前來僧近前門云汝不是患聾乃云還會麼僧云不會門云汝不是患瘂僧扵此有省盲聾瘖瘂誰能接退後近前指下明多向珍候沉動不知三種一毛病翠岩夏末示眾云一夏已來与兄弟東西話看翠岩眉毛在麼保福云作賊人心虚長慶云生也雲門云関偷眼才開先下手眉毛生也月方明雲門関子重鎻直至而今絕夜行𥂁官一日喚侍者云与我將犀牛扇子來侍者云扇子破了也官云扇子既破還我犀牛兒來侍者无對投子云不辝將出恐頭角不全雪竇拈云我要不全底頭角石霜云若還和尚即无也雪竇拈云犀牛兒猶在資福𦘕一圎相扵中書一牛字雪竇拈云適來為什麼不將出保福云和尚𥝝尊別請人好雪竇拈云可惜勞而无功犀牛扇子清風起坐断清風出氣難破了當年重用去和烟搭在玉欄干雪峰住庵時有兩僧來礼拜峰見来以手托庵門放身出云是什麼僧亦云是什麼峰低頭庵僧後到岩頭頭問什麼𩂜来僧云嶺南来頭云曾到雪峯麼僧云曾到頭云有何言句僧㪯前話頭云佗道什麼僧云佗无語低頭庵頭云噫我當初悔不向佗道末後句若向伊道末後句天下人不柰雪老何僧至夏末再㪯前話請益頭云何不早問僧云未敢容易頭云雪峯雖与我同條生不与我同條死要識末後句只這是同條生不同死拈却明頭収暗頭此放身庵去至今簾外鬼神愁溈山五峯雲岩同侍立百丈百丈問溈山併卻咽喉唇吻作麼生道溈山云却請和尚道丈云我不辝向汝道恐已後䘮我兒孫復問五峰峰云和尚也湏併却丈云无人斫額汝又問雲岩岩云和尚有也未丈云䘮我兒孫東街栁色和烟翠西巷桃花相映紅幾度春風晚鐘裏遊人著意到寥空南泉叅百丈涅槃和尚丈問従上諸聖還有不為人底法麼泉云有丈云作麼生是不為人底法泉云不是心不是佛不是物丈云了也泉云某甲只与麼和尚作麼生丈云我又不是大善知識爭知有不泉云某甲不會丈云我太煞為你了也從上為人事不容老胡知寒雲抱幽石霜月照清池大随問僧什麼去僧云礼普賢去随㪯拂子云文殊普賢揔在這裏僧作圎相拋向背後乃展兩手随云侍者取一帖茶与這僧遠聞近見一賔主半暗半明孰与揚若是个中全用去普賢特地逐亡羊三角緫印云若論此事眨上眉毛早已蹉過也麻谷便問眨上眉毛即不問如何是此事角云蹉過也谷乃掀禪床角打之谷无語地獄天堂阿剌剌機関直下沒應把姦生多変卻難得雙放雙収過新羅維摩詰問文殊師利何等是菩薩入不二法門文殊師利云如我意者扵一切法无言无无示无識離諸問荅是為入不二法門代維摩打出扵是文殊師利問維摩詰我等各自已仁者當何等是菩薩入不二法門維摩默然代文殊乃喝不二法門何再二千三一齊来當𥝝妙吉親用去扶淂病翁使口開僧問趙州初生孩子還具六識也无州云急水上打毬子僧復問投子急水上打毬子意旨如何子云念念不停流六識問来難識破趙州老大只麼酧可憐同道實頭漢道道念念不停流京兆米和尚因有老𪧐問月中断井索時人喚作蛇未審七師見佛喚作什麼米云若有佛見即同眾生𪧐云千年桃核師別米和尚驀口一拳断井索子月中為蛇衝氣吐毒跳沫馳波生兮佛兮齊難話多劫潛微滅磨不滅磨紫金光聚照山河雲門云古人道人人尽有光明在看時不見暗昬昬作麼生是光明代云厨庫三門又云好事不如无九天雲淨眾星微風𫤭何餘一句詩今夜与君无事去時人喚作那斯祁三門厨庫是光明見不見時難辨別好事元来不如无烏鷄半夜啄生銕馬大師不安院主問和尚近日尊位如何大師云日靣佛月靣佛日靣佛月靣佛三三兩兩太无端二十年来苦辛客照絕精微見大難僧問雲門如何是超佛越祖之談門云胡餅覿靣胡餅難下口摩斯吒徒入瀾中者回休吐黑雲霧寥廓天邊无白虹百丈惟政禪師一日謂眾云汝為我開田我為汝大義僧眾開田竟請和尚大義百丈便展開兩手閃電激怒雷馳眼裏耳裏个覿機昨夜三山三跳後北辰鬼谷作擬議作擬議七佛祖師曾未知平田普岸禪師因有僧到叅平田打一拄杖其僧近前把住拄杖平田云老僧適来造次僧卻打平田一拄杖平田云作家作家僧礼拜平田把住云是闍梨造次僧大笑平田云這个師僧今日大敗也一向一背不易親互換韜略鼓旗別干將劒未斬甲鍪夏服箭何穿七札鬼哭神悲崖崩石裂還顛蹶師僧今日大敗大慈山寰中禪師住庵時南泉至問如何是庵中主寰云蒼天泉云蒼天且置如何是庵中主寰云會即便會莫忉南泉拂袖而出庵中主見還難句裏蔵身太无端偷眼暫時休也未夜深誰共過関山僧問藥山平田淺草麈鹿成群如何射淂麈中麈山云看箭僧放身便倒山云侍者拖出這死漢僧便走山云弄泥團漢有什麼限雪竇拈云三步雖活五步湏死麈中麈走淂三步五步未堪趂虎兒趂兒獵人徒莫覔坤維慧忠國師与紫璘供奉論議既升座供奉云請師立義某甲破忠云立義竟供奉云是什麼義忠云果然不見非公境界便下座祖風逈振機輪轉斈海瀾忙自沒頭大鵬一㪯九里籬邊燕雀空啾僧問洞山如何是佛山云麻三斤木落岩崗鋒骨泠月斜禪石曉難開寒雲伴来閑不徹飛瀑從佗起忽雷六祖云不思善不思𢙣正當恁麼時還明上座本来靣目来五步欵行三步疾莫教正眼頂門開悠不見𢈔嶺路腳後腳前去来霍山和尚聞祕魔岩和尚凢有僧到礼拜以木义义霍山一日遂往訪之才見不礼拜直入祕魔懷裏祕魔拊霍山背三下霍山起拍手云此老一千里地賺我来便回當機提覿靣疾取次用来若為宗个个一千應走卻草鞋跟断起清風梁武帝問逹磨大師如何是聖諦第一義磨云廓然无聖帝云對朕者誰磨云不識廓然不識有幾人古路橫行鎖嶺烟此少林深雪裏断臂刀下別踈親風穴垂語云若立一塵家國𫤭盛野老嚬蹙若不立一塵家國䘮亡野老謳歌雪竇拈柱杖云還有同生同死底衲僧麼嚬蹙謳歌在一塵同生同死慿何人紅霞碧靄籠高低芳草野花一樣春南嶽懷讓遣一僧到馬祖去云但問作麼生伊道底言語記將来僧去一如懷讓旨回謂懷讓云馬祖云自従胡乱後三十年不曾闕𥂁醬讓然之朝三千暮八百个个放過一著生銕如和土壤大冶可解拈却頌古竟
