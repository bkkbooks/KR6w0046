body:
  text: 雪竇語錄中事一日云此大講堂洞開在甚麼處東方日輪昇天則有明曜瞎中夜黑月雲霧晦暝則復昏暗時節難逢戶牖之隙則復見通大無大墻宇之間則復觀壅小無小分別之處則復見緣一二三四五頑虚之中遍是空性鳥飛魚沉鬱㶿之象則紆昏塵也何好澄霽斂氛又觀清淨咄慚愧釋迦老子報恩有分甚還與不還五帝三皇是何物文殊堂裏万菩薩到處覔不得作麼作麼元來揔在者裏不解自愧刢利漢一見便請拗折拄杖便与一掌上堂㪯鏡清問僧近離甚處問即問云石橋是實石橋清云本分事作麼生被者僧勘破云某甲近離石橋何時解合耴狗口清云我不管尒石橋本分事作麼生柰爭之不足何云和尚何不領話預知个乱走底清便打尽三千界一齊分碎僧云某甲話在古墳草青清云尒但喫棒我要話行將謂鏡清竇云然則𠋣勢欺人柰緣事不孤起有權有實者僧若能慎初護末棒則須是鏡清自喫雪竇好与二十棒㪯雲門大師示眾云尒若不相當苦屈人也且覔个入頭處教人入草裏去微塵諸佛在尒舌頭上三蔵聖教在尒脚跟底誰不如悟去好三頭六臂還有人悟得麼出來對眾道看諸人不可向此動著竇拈云然則養子之緣只与麼爭柰壓良為賤快慶平生其間忽有不甘底出掀倒繩床豈不是大丈夫漢也不放過然雖如此且問據个甚麼也是又云也難容也竇驀拈起拄杖走向那裏去云洎合停囚長智相續來也無擊繩床一下便下座更有上座在上堂云窮諸玄辨若一毫致於太虚銀山銕壁竭𠀍樞機似一滴投於巨壑銕壁銀山不如歇去好銕壁銕壁還會麼辜負碧眼胡僧客亭不遠不審不審上堂云青蘿夤緣直上寒松之頂傍觀有誰白雲淡泞出沒太虚之中逹磨不來東土二祖不行西天竇拈起拄杖它家自有通𫕟路云國師眼睛在者裏瞳子舞三臺瞌睡漢七穿八甚處得來蝦䗫窟裏出頭來一日㪯乾峯示眾云舉一不得舉二吾王庫內無如此刀放過一著落在第二幾回山下路雲門大師出眾云昨日有人從天台來却往南岳去貪程疾矣峯云來日不要普請大眾拋下手裏金槌竇云諸禪德雲門老漢只解一手擡不能一手搦德行難齊還有共相著力底麼試露爪牙看相別相逢竟何事一声江上起春雷上堂云不得春風花不開花開又被風吹落榜樣有兮尒若明得褒貶句莫以常住物作自己用未必善因而招𢙣果皈堂著了也一日云古人道其為也形夜半正明其寂也天曉不露轉變天地自在縱橫晨朝粥齋時飯河沙而用混沌而榮喝云且休夢誰聞不喜誰聞不驚還有分麼如何以無價之寳隱在隂入之坑粘手粘脚脫不得竇以拄杖擊一下眼裏添橛云打破了也肈公知麼也無寳在甚處幾乎打破了也有時云不之令大眾必合依行今日某甲困上堂云万法本閑還我話頭來而人自閙好言不出口國師走入露柱裏去也千𥝝田八百主見麼見麼瞎良久長安雖樂難久居云出頭便死皈堂釋迦勒退後三千示眾云廻而更相涉七花八裂拈起拄杖舌頭曳地云頭上是天脚下是地吾不如你眼前綠水背靠青山耳根眼頭従何得來衲僧道我會也忽若騎驢入尒鼻孔裏爭柰有諸方在牽牛入尒眼睛中也是泥裏洗土塊又作麼生商量請与某甲乞命去上堂云欲得現前莫存順逆蒼天蒼天者裏參見祖師了失却目前機更買草鞋行脚好个伴子三千里外也被雪竇穿却鼻孔雖然如是三十棒教誰喫一日㪯馬祖上堂眾方集瞎漢堪作个甚麼百丈出捲席金不博金水不洗水祖便下座有甚麼馬祖諸方皆謂奇特漝麼舉還當麼今日不得已若當譬若水母以蝦為目吽吽拈將來若不當又空讚歎个作麼半合半開眾中一般漢乱踏向前問古人意旨如何賔主落草更有老底不識好𢙣對云將謂仙陀客打云作麼作麼又云來日更到座前不合忩忩擾擾苦哉苦哉如此自稱宗匠欲開人天眼目驢𥝝去一坑埋却諸上座雪竇當時若見伊出來捲席劈胷與一踏同道者少令坐者倒者俱起不得豈止而已且要後人別有生涯去免見互相鈍置豈不个个英靈底漢蒼蠅放夘還會也無皈堂不濟一事上堂云虚空為皷聞者即𭈬湏為槌無手者好打打者甚多某甲要瞌睡聽者極少但雪竇一个且問誰是解打者莫謗𥂁官好𭰹領指示只如南泉道王老師不打者破皷咦法眼云王老師不打過兩个既不柰何一个更是懡㦬人無遠慮必有近憂上堂云還有閙市裏出頭底麼眼界闊多少良久抓著某甲痒云不如䇿杖皈山去長嘯一聲烟霧𭰹便下座莫作異類見解㪯僧問趙州學人乍入叢林乞師指示更不可悟去州云喫粥了也未接得半邊云喫粥了也三生六十劫州云洗鉢盂去水洒不著雲門大師云且道有指示無指示為慈悲之故有落草之談若云有向佗道什麼爭柰轉多若道無何得悟去莫塗糊个僧好竇拈云我不似雲門為蛇𦘕足个一隊不知好𢙣漢直言向尒道果然問者如蟲蝕木朝三千答者偶尒成文暮八百然雖恁麼瞎却衲僧眼八兩半斤作麼生免得此過何必諸仁者要會麼謝勞神力還尒趙州喫粥未拈却一口啜去者僧喫粥了堕在鉢裏雪竇与尒拄杖了皈堂不作痛痒㪯雲門大師云盡十方𠀍界乹坤大地天下老和尚不消一捏以拄杖一劃費力不少云百雜碎見麼見麼竇云者老漢是即是報恩有分要且未有出身之路要扶起去如今拄杖在雪竇手裏堪甚麼復橫按叱云東西南北甚得來猶不是衲僧行履㪯僧問投子如何是十身調御在多少臺上投子下繩床立一二三又問凢聖相去多少莫下个注却投子下繩床立四五六竇云此公案諸人無不委知某甲從來不會若漝麼㪯天下衲僧盡為念話杜家㘞雪竇莫有長也無若有个漢作麼生試為大眾㪯看个个觀𠀍音凢聖相去多少投子下繩床立一囬拈出一囬新如何是十身調御投子下繩床立雪竇㪯了也且道与前來㪯底同別一任諸方道得若道一般許上座具一隻眼眼眸重斤若云別有竒特也許上座具一隻眼臨崖看虎眼復更開一線道苦瓠連根苦凢聖相去多少請上座下一轉語休別道得如何是十身調御答一轉話退倒三千非但參見投子亦乃知雪竇長知我罪我或若揔道下繩床立驀口便打惜耴眉毛収便下座也与三十棒㪯洞山聦和尚每見新到便問溈山水牯牛上座作麼生會遇賤則貴遇貴則賤前後皆不相契幾乎放過竇到亦乃垂問撞著个無慙愧漢竇云後人標牓兩口一舌洞山擬道待海變桑田竇以坐具拂一下便行不免脚下𭘧紅絲線洞山云且來上座令我憶德嶠竇云未參堂雖然如是未出洞山綣繢在拈云但惟但倠㪯雲門大師云三乗十二分教看著即眼瞎逹磨西來相逢即心死放過即不可勾賊破家若不放過不消一喝豈敢竇随㪯了便喝爭柰後語復云大眾好喝落在甚處長覔短若要鼻孔遼天且皈去來辨取者一喝還曾喝得麼便下座敗也竇因事示眾云杜耳目於胎殻夢見也未掩玄象於霄外三千里外而責宮商之異堪悲堪痛辨玄素之殊底是甚麼人和你脫不得還知落處麼果然果然那一个者一个自作自受兼本三人便打放過一著蹉過者多便下座咦上堂云三十𥝝來尋劒客剔起眉毛有麼有麼好你用去幾囬葉落又抽枝不孤負佛祖衲僧眼光失却了也甚麼去自從一見桃花後惑乱天下填溝塞壑更有牽伴直至如今更不疑打云更知痛痒始得敗軍之將𩂜𩂜捨命以拄杖卓地一下住住有傍人在云看頼有个語便下座頂上無骨頷下有鬚㪯皈宗問僧甚處去臨行叮嚀云諸方學五味禪去甞得个味宗云我者裏有一味禪為甚不學知它去分明僧云如何是一味禪不𭈬身失命宗便打一棒作一棒用也無僧云莫打某甲會也快便難逢宗云尒作麼生會至此知皈宗僧擬開口不誤喫棒宗又打此棒皈宗也須喫却黃檗聞㪯云馬大師出八十四貟善知識此老只解与麼道問著个个屙轆轆地恐是在人背後只有皈宗老較些子便打竇云以彊欺弱有甚麼難也有喫棒我者裏有一味禪為甚麼不學但向道収果然待伊拈起有三十棒在有般無眼漢只管喫半開半合吽吽滿口道著雪竇門下誰敢㘞便下座了了上堂云胡蜂不戀舊時窠其它無別猛將不在家中死劒在甑人手若是个漢聊聞㪯著剔起眉毛便行若逢著某甲又作麼生一日六人新到竇問云還有作家禪客麼者僧未參堂參頭云和尚道什麼眼目定動竇云點即不到不勞再勘僧擬議好个禪客竇便喝當断不断却招其乱僧無語竇云龍頭蛇尾重言不可吃復問第二个僧指參頭云和尚問何不祗對走向甚麼去竇與一掌僧無語機輪轉作者猶迷竇復指云第三其僧茫然竇云一狀領過平出上堂僧問如何是時節因緣竇云瞌睡漢鳥飛不度僧便喝三十𥝝後也少竇云詐惺惺可惜許復云譬若世界壞時寐語也未大水競作誰是好看其間無量眾生或沒或未沒東岸近西岸遠互相悲號仰蒼蒼皆云相救有麼有麼當尒之時四禪天人一見高聲便喝天然有在咄哉眾生我預曾報你依稀佀曲纔堪聽令頻頻上來莫孤負一條銕你都不聽与雪竇同參如今有甚救便打乃拍手一下吽云皈堂將謂眾生苦更有苦眾生上堂云乹坤之內宇宙之間銕壁銕壁中有一寳瞎挂在壁上出入面門覺麼逹磨九𥝝不敢正眼覷著只為滿眼也如今衲僧要見劈脊打照天照地上堂僧問如何是佛竇云頭髼鬆耳卓朔口廣脚短僧云不會吞却雪竇竇云堪笑堪悲半合半開復云不著便也不柰何元來只与麼尒從江南江北笠子下為什麼拶破洛浦遍參底兩鏃蒺䔧上堂云乹坤把定即不無尒作麼生是手擎日月底句莫開摩瞌眼代云兩兩又云有未參堂人又云雲門大師來也又云周遊四天下道我知有須頂上著得幾人休行高高山頂代云唯有和尚一个又云某甲相喚去又云俱復云㪯步已經諸佛剎是尒草鞋破多少不可借路經過代云若与麼可惜許又云与老師還草鞋錢又云一雙兩雙上堂云長觜鳥芳樹不棲喃喃獨語無耳底聽得摩斯吒滄溟不入戰戰却廻無眼底見得三十秊後悟去如猿捉影提起手云吽吽一囬抓不得兩囬抓得便下座咄上堂㪯在眾日僧問如何是佛竇云四眾圍遶頂天履地如何是湼槃竇云雙林樹下日𬉹風吹復云便是釘觜銕舌漢也卒話會不及皈堂三叚不同収皈上科有時竪起拄杖劈不開云洪機在掌排巨靈擘太華之峰未免勘破个漢復橫案云明鏡當臺絕演若逐東西之逕且向階下合掌又以拄杖一劃重言不可吃云比擬張麟兔亦不遇便下座者邊有人立我不如你上堂云不與一法作對便是無諍三昧我不要無孔銕槌或是个漢聞我㪯著悉能坐断有甚麼近處顧視左右云阿誰雖然如此向後莫辜負人好便下座喏喏上堂㪯古人道明眼漢沒窠臼有人恁麼會我且問尒各從德山林際下來如麻似粟棒喝向尒不能大好退倒語言向尒使不著一時快活我既如此便打汝合必然相識滿天下又作麼生露得个消息左右難侍人令雪竇知尒是个風不入底漢去便下座且解眠去好一日三僧辤竇把住云天無門地無戶乱走衲僧擬往何處問去也未僧皆無對三人證龜作鼈竇劈靣唾云枉喫我多少粥飯為物傷慈便推出長安雖樂難久居示眾云摩竭正令譬若披沙揀金何時了也毗耶杜辤頗類守株待兔天堂未就地獄先成設使頓開千眼笑殺露柱未辨機関賺殺人點著不來那裏去也白雲万里誰是个中人㪯永嘉云六般神用空不空一二三四五六一顆圎光色非色六五四三二一雲門大師拈起拄杖還提得麼云是色非色刺破眼睛竇云雪竇即不然大好有人圎光一顆儱侗真如与永嘉同參神用六般和泥合水三千里外塻窑人設齋且致水中拈月致將一問來也是不妨皈來有時云袖頭打領腋下剜襟豈止文殊七佛師諸方一任翦裁因誰置得南山起雲北山下雨衲子作麼生話會且道是放是収一日上堂大眾纔集切忌別竇云一任諸方貶剝有誰聞得便下座洎乎相見㪯僧問乾峰十方薄伽梵一路湼槃門路頭在什麼處峰云在者裏著口上竇代僧便喝蝦跳不出斗有一拶復有僧問長慶慶云問取堂中第二座將謂杷得住竇代僧云錯都羕它恩力復有僧問雪竇竇云堕坑落壍多少敗自代云作賊人心虚便打上堂云糞掃堆上現丈六金身遇賤則貴也是赤肉團上壁立千仞遇明則暗道著鼻孔遼天底衲僧試辨雪竇為人眼也与麼去示眾云一法不通万緣方透用無孔銕槌作什麼會與不會成群作隊拈來与我看築著磕著一時拈却従旦至暮管取乾坤獨露従來羕誰恩力便下座咦上堂云禪河随浪靜不用澄淨定水逐波清灘下底若拄杖子是浪衲僧便七縦八橫一二三四五六七忽乾坤大地是浪便見扶籬摸壁東西南北上下四維且道放行好把定好海母以蝦為目一日云春雷已發陽鳥未啼俱迷身句即不問尒透出一字作麼生道三十𥝝養得底事代云非上堂云巢知風知雨刢利衲僧未可相許不審若問如何苦哉佛陀參咦㪯馬大師云一切語言是提婆宗以者个為主銕丸無縫𦉑雲門大師云好語只是無人問我鐃鈎搭索僧便問如何是提婆宗門云西天九十六種尒是㝡下種當有跨門閫竇云赤幡被者僧奪了也便下座話作兩橛一日云山河無隔礙光明處處透南山燒炭北山紅傅大士騎驢入尒鼻孔裏一二三四五見尒諸人不惺惺却皈雙林寺去也便下座諸人看末後句㪯僧問翠微自到和尚法席每沐上堂不蒙一法示誨意在於何要喫棒微云嫌个什麼放過一著僧復問洞山山云爭恠得老僧落在第二後有僧問法眼眼云祖師來也似則似是未是竇云兩个老漢被者僧穿却有權有實唯有法眼與他同參錯若是雪竇門下喫棒了趕出猶較些子上堂云種種幻化皆生如來圎覺釋迦老子眼睛突出竇云住住三世諸佛是幻六代祖師是幻天下老和尚是幻布袋盛錐復拈起拄杖幻不幻云拄杖子是幻那个是圎覺還我話頭來良久以拄杖擊繩床一下道什麼云幻出幻幻大眾擬議作麼作麼竇云者一隊漆桶揔無孔竅以拄杖一時趂下能有幾人㪯夾山問僧甚處來問著也無要云湖南來破草鞋山云曾到石霜麼豈是欠少云要路經過爭得不到著爛如泥山云羕聞石霜有毬子話是否輥草裏作麼云和尚也須急著眼半前半後山云作麼生是毬子弄得堪作什麼云趒不出且無縫𦉑云作麼生是毬杖也休靠倒云勿手足只解拄門不解拄戶山云老僧未曾與闍梨相識出去某甲只管見夾山竇云雪竇親見者僧從石霜來半開半合夾山因甚麼道不相識看㪯趙州問僧甚處來可惜許云雪峰來与趙州同參州云雪峰近日有何言句示徒道得看僧云雪峰道盡大地是沙門一隻眼尒諸人向什麼處屙後來也恁麼州云尒若過嶺我附个鍬子去問頭不相謾竇云者僧既不從雪峰來可惜趙州鍬子傾尽此時意雖然如是還我話頭來㪯僧問石霜三千里外遠聞石霜有个不顧堪笑堪笑霜云是堪笑僧云只如萬像歷然是顧不顧可笑可笑霜云我道不驚眾可笑可笑僧云不驚眾是不与像合如何是不顧可悲可悲霜云遍界不曾蔵可痛可痛竇拈云誰是不顧者勘破了也示眾云世界與麼廣闊為甚麼向雪竇手裏乞命眾眼難謾代云皈去來也上堂云乾坤側日月星辰一時黑鳥飛不度東西不辨南北不分底衲僧向甚處見雪竇瞎又云咦代云堆堆地上堂僧問雪覆蘆花時如何竇云點眼裏打橛僧云恁麼則為祥為瑞自傷己命竇云兩重公案相逢不出手復成一頌雪覆蘆花欲暮天迦那提婆來也謝家人不在魚船不知何是鄉関白牛放却無尋處突出難辨空把山童贈銕鞭望空啟告又云有同道在洞庭語錄竇云宗乗一唱獨露大方三蔵絕詮風行草偃祖令當行縮頭去也十方坐断天不高地不厚其有逹士也在甚麼處不避死生水不借路眨上眉毛也太嶮出眾相見打不著問人天普集如麻似粟佇聽雷音聾却耳根學人上來乞師垂示被你領取竇云十万八千不是遠近哉乎僧云與麼則大眾霑恩也築著你鼻孔竇云後五日看放過一著問師唱誰家曲宗風嗣阿誰自屎不覺臭竇云分明記取須到如此進云與麼則昔日智門今朝和尚伏惟竇云有甚麼交涉疋上不足疋下有餘問如何是諸佛本源作麼作麼竇云千峰寒色眼見如盲口如啞僧云向上更有事也無你須問耴竇云雨滴巖花難湊泊也問如何是和尚為人一句竇云量才補職佛祖絕境界僧云謝師方便咦竇云自領出去恩大難酧竇乃云一問一答還會麼揔未有事在有麼有麼直饒乾坤大地草木叢林盡為衲僧異口同聲各置百千問難也不消長老彈指一下金剛鑄銕券並乃高低普應前後無差一二三三二一曠祖佛之妙靈廓天人之幽迹恁麼恁麼不恁麼不恁麼如是則何假覺城東際五眾咸居古佛廟前此時參畢龍頭蛇尾竇在杭州靈隱授䟽了眾請陞座時有僧問寳座先登於此日請師一句震雷音點銕化為金玉易竇云徒勞側耳勸人除却是非難僧云恁麼則一音普遍於沙界大眾無不盡咸聞是柱不見拄竇云忽有人問尒作麼生㪯無人見庫僧云三十𥝝後敢為流芳不欠礼拜又作麼生竇云賺了也後人標榜乃云天下絕勝之覺場靈隱導師之廣座一步易兩步難暫借𤰞僧陞陟還我話頭來實愧非材爭之不足豈敢於五百貟衲子前一坑埋却提唱佛祖抑揚古今何不從此去衒耀見知恥他先作雪竇靣前事假饒得天雨四花地分六震諸人安身立命於曹溪路上一點使用不著顛言倒語何以行脚高士㘞有把定世界蓋乾坤底眼快便難逢誰敢錯悮𮈔毫在甚麼其知有者必共相悉假饒与麼去得只半途竇在靈隱諸院尊宿茶筵日眾請陞座僧問禪侶盡臨於座側未審師還也無多少人要与麼底竇云寰中天子塞外將軍上崢嶸無天僧云恁麼則一震雷音滿大唐也還有耳也無竇云看取令行瓦解冰消去也乃云上士相見一言半句如擊石出火未免傍觀之哂瞥尒便過應非即言定旨滯句迷源有也有也從上宗乗合作麼生議論為物傷慈直得三世諸佛不能自宣六代祖師全提不起一大蔵教詮注不及大家在者裏所以棒頭取證喝下羕當意句交馳竝同流浪其有知方作者相共證明去去与誰同上堂問向上一路千聖不傳和尚從何而得問殺个老漢竇云將謂是衲僧莫認影好僧云恁麼則大眾霑恩學人礼謝也領殺个老漢竇云龍頭蛇尾也有幾个問選佛場開還許學人選也無未免老婆禪竇云切忌點額一句兩句僧云恁麼則心空及第皈也有人點頭竇云堦下漢道道竇乃云如天普蓋絕毫絕𨤲佀地普擎鳥飛不度有如是自在重如毫輕如山具如是威德三𠀍諸佛悉是兒孫誰不羕恩眼見耳聞誰不景慕放下一著過去諸聖於無量劫勤苦受盡只冝拄杖子所得祕要法門低声低声今將普示大眾苦哉佛陀耶不用纖毫心力傍觀之哂各請一時驗取不用皮袋裏於此薦得毛凢道不辜負你便能永出四流高步三界也是其或不知它日難點削剛是諸人諱却便喝竇初到院陞座僧問杖錫已居於此日請師一句定乾坤時節難逢豈有今日事竇云百雜碎一二三四五六七進云恁麼則海宴河清去也爭柰口頭竇云非公境界見之不耴思之千里問如何是佛法大意多少人恁麼會竇云龍吟霧起虎嘯風生誰敢近傍問如何是祖師西來意好幾个竇云山高海闊道將一句僧云學人不會無人㪯著竇云緊帩草鞋爭頭底在甚麼乃云未來翠峰宊殺天下人多人疑著有眼有耳及乎親到一境蕭然也須打破非同善才入樓閣之門暫時斂念蝦䗫窟裏出頭來莫比維摩掌中世界別有清規鵝王擇乳素非鴨類冀諸人飽足觀光作麼生道得作麼生㪯以資忻慰普同供養上堂僧問和尚未見智門時如何須拾得口喫飯竇云你鼻孔在我手裏錯又云見之不耴學云見後如何須問過好手竇云穿過髑髏錯又云什麼去也有僧礼拜起云請師答話幾个目瞳竇便棒掣電之機僧云豈無方便攸久難得人竇云罪不重科放過一著復有一僧出來礼拜起云請師不答話脚下豈點地竇云兩重公案人従陳州來不得許州信僧云謝師答話不𮨇𭈬身竇亦棒崖崩石裂乃云釋迦已滅𢏏勒未生逹磨來也正當今日佛法委在翠峰有麼有麼放開捏聚揔由者裏將謂者漢放開也七縱八橫𦘕虎作狸是處填溝塞壑一手擡一手搦捏聚也天下老和尚盡在拄杖頭古路無人到不消一劄笑倒天下人又云自領出去上堂僧問如何是緣生義途中善為竇云金剛鑄銕券大冶磨礱兮不下僧云學人不會暗裏打著竇云閙市裏牌兩重公案僧云恁麼則行到水窮處坐看雲起時相見渾無事不來還憶君竇云列下好与麼去也問如何是維摩一默古今与麼會竇云寒山訪拾得那裏得个消息來僧云恁麼則入不二之門也蹉過了也竇云噓合耴作家眼目好復成頌云維摩大士去何從莫随它脚跟轉千古令人望莫窮以己方人作麼不二法門休更問相牽入火坑夜來明月上高峰可惜許上堂僧問如何是實學底事直饒与麼去三十棒竇云針劄不入費力不少僧云乞師方便你也恁麼竇云水到渠成一个兩个問如何是教外別傳一句雪竇未到竇云看看臘月盡輸却林下人僧云恁麼則流芳去也三人中必有我師竇云瘂子喫𤓰雪竇門下問言迹之興異途之所由生不犯鋒鋩請師道未敢容易竇云誰家無白月清風三十𥝝後我也不恠僧云還當也無向後換手打去竇云土上加泥漢黃連未是苦問如何是學人自己不知你是誰家子竇云乗槎斫額甚麼去也僧云莫只者便是適來道甚麼竇云浪死虚生千佛叉手立竇乃云劒輪飛處日月沉輝大有人落太冶之手寳杖敲時乹坤失色能事不容眾魔從茲瞻裂宇宙風清千聖由是眼開以字不成八字不是其如二聽不圎迷逢逹磨震迅雷而莫覺釋迦勒無分孤根將敗万里一條銕霈春雨以非滋打不著致使凢聖岐分悟迷𣲖列一二三四五六七奔馳七趣一出一入汩沒四流半合半開重業相纏堆山積岳無有休日日居月諸尒諸禪德眉橫鼻直覬善參詳崑崙嚼生銕如人上山脚頭脚底各自努力無孔銕槌上堂僧問昭昭於心目之間而相不可覩晃晃在色塵之內而理不可分既於心目之間為甚麼不覩其相憶得送人時竇云花須連夜發莫待曉風吹壁立万仞僧云恁麼則雲散家家月向阿誰竇云毗婆尸佛早留心針頭削銕僧方礼拜碧潭空界月竇以拄杖打一下云不得放過費力不少問四十九𥝝不盡底請師人謂針觜銕舌竇云爭之不足兩鏃蒺䔧僧云謝師答話疋下有餘竇云銕棒自看痛下針錐問如何是把定乾坤眼莫自欺竇云拈却鼻孔合耴作家眼目僧云學人不會銕作心肝也断腸竇云一喜一悲皈去來也僧擬議屈殺个老漢竇云苦果然問猿抱子皈青嶂後鳥𭊷花落碧巖前古人意旨如何阿誰如你竇云夾山猶在久後難論僧云和尚如何德兮不孤竇云依稀似曲纔堪聽又被風吹別調中雪上加霜僧問如何是翠峰境到諸方㪯竇云春至桃花亦滿溪錯僧礼拜去得好竇云山僧今日敗果然有人點檢得出許佗頂門上一隻眼便下座不悮道愛韶陽新定機上堂僧問古人借問田中事插鍬叉手意如何你問得一半竇云人従陳州來不得許州信一三三二兩兩問古人道有讀書人報來意旨如何吃嘹舌頭竇云且在門外立同道方知學云請師相見若何若何竇云任是顏囬亦不通壁立万仞乃云立賔立主剜肉作瘡為法忘身㪯古㪯今拋沙撒土平出直下無事佛祖無分正是無孔銕槌謝證明也別有機関把手共行合入無間地獄覔此人也少明眼衲子應須自看幾人蹉過去也上堂僧問古人一喝不作一喝用是否學言語漢竇云是失僧便喝若与麼去竇便棒得僧無語道道竇云謔我但惟但倠問古人道有佛法處不得住無佛法處急走過意旨如何趙州猶在竇云氣急殺人有麼有麼僧擬議走過走過竇云甚麼處去也拘留孫佛問只在目前為什麼再三不覩也此色多竇云截耳臥街逐而不去僧云恰是莫勞心力竇云令我攢眉何止一兩句問黑豆未生芽時如何相逢者少竇云餧驢餧馬咬定牙関僧云生後如何竇云透水透沙乃佛乃祖僧礼拜慙愧不少竇云一似不齋來安即難難即安問功巧諸𠆸藝盡現行此事如何是此事七九六十三竇云諸方牓樣雪竇不多僧云莫便是學人會處也無洎乎相似竇云有頭無尾漢橋流水不流竇乃云過去諸如來斯門已成就水到渠成放過一著扶起得麼現在諸菩薩令各入圎明兩重公案一任阿你了也未來修學人揔被翠峰穿却鼻孔能有幾个上堂云智者聊聞猛提取作麼作麼莫待須失却頭与誰道著上堂僧問如何是脫𭹀御服挂弊垢衣遇貴則賤遇賤則貴竇云垂手不垂手果然僧云乞師再垂方便千聞不如一見竇云左眼挑䈥右眼抉肉兩兩三三問龍門爭進㪯那个是登科恁麼題耴好竇云重遭點額蒼天蒼天進云學人不會地獄門前竇云退水蔵鱗不曝腮是好手問獨步丹霄時如何過也竇云脚下踏索得得得進云天下橫行去也且看脚下竇云徐六擔板有人點頭問學人乍入叢林諸事不會未審和尚還拯濟也無不可道是可也竇云蘓州紙貴誰更酧價進云和尚豈無方便諸人作麼生會竇云𦛁後拔榍三十𥝝後竇云爐鞴之所固無鈍銕咦良醫之門誰是病夫叱向後鼻孔遼天莫孤負人好覔火和烟得上堂云欲得不招無間業莫謗如來正法輪便下座壁立万仞上堂纔有僧出礼拜磕著了也竇云大眾一時記耴者僧話頭失却了也便下座咄上堂大眾雲集三千八百以拄杖拋下無孔銕槌云棒頭有眼明如日要識真金火裏看壓良作賤上堂云從天降下從地湧出拶破靣門南北東西一棚俊鶻蹉過也不知顧杼停機是个什麼苦屈苦屈一収得上堂云古人道譬如𬅈劒揮空莫論及之不及空裏釘橛斯乃空輪絕跡劒刃非虧區區地也好諸禪德若能如是心心無知裂破即是踞妙峰孤頂突出難辨非但善才七日不逢阿誰設使文殊百劫親來也摸索不著雲在嶺頭閑不徹水流澗下太杜生上堂有僧出礼拜了方伸問退倒三千竇云啼得血流無用處便下座𦘕虎成狸上堂云蔵鋒劒客便請呈三權猶在有僧方出來何不自來竇云什麼處去也思之千里便下座時乎時不再來上堂云語漸也返常合道有幾人且任諸人點頭耳朵聻論頓也不留朕跡作麼作麼衲僧又奚為開口龍頭蛇尾竇以拄杖一劃吽吽云上無衝天之計幾時休下無入地之謀一進一退蔡州千个万个在甚麼打破只在須苦哉佛陀耶上堂僧問寂寂忘言誰是得者口上著竇云卸㡌穿雲去天覆不得僧云如何領會抓著雪竇痒竇云披莎𭘧雨歸僧云三十𥝝後此話大行孤負个老漢竇云一場酸澁兩問坐断毗盧底人和尚還接否交竇云慇懃送別瀟湘岸錯僧云恁麼則學人罪過也自領出去竇云天寬地窄太愁人逈絕烟塵僧礼拜棺木裏瞠眼竇云苦屈之詞不妨難吐不免勞心力問生死到來如何回避時節難逢竇云定花板上明如杲日僧云莫便是他安身處也無朝打暮打竇云符到奉行大難大難竇乃云逹士相逢各各箭鋒相拄敗也敗也若也聲和響順形直影端何有閑工夫交互不來並同死漢將謂雪竇是个人上堂僧問逹磨未來時如何竇云猿啼古木一二三僧云來後如何竇云鶴唳青霄三二一僧云即今事作麼生竇云一不成二不是問呵呵問古人道北斗裏蔵身意旨如何竇云千聞不如一見眼裏曈人學云此話大行大言也少竇云老鼠𠾑銕兩重公案問古人道皎皎地絕一𮈔頭只如山河大地又且如何全舌去好竇云靣赤不如語直果然僧云學人未會分明重記耴竇云遍問諸方靜娑婆訶乃云映眼時若千日瞎万像不能逃影質道什麼凢夫只是未曾觀此老自知羞好何得自輕而退屈苦屈苦屈竇拈起拄杖云把定世界不漏𮈔髮還觀得也無傍若無人所以雲門大師道直得乾坤大地無纖毫過患分只是轉句退後三千不見一色猶為半提遠行近皈直得如此更須知有全提時節打疊也未諸上座翠峰若也全提盡大地人並須結舌分開未在者个放一線道轉見不堪孤危未在作家以拄杖一時趂下停龱長智上堂僧問如何是翠峰境以者个為主竇云有眼底見何不問个漢學云如何是境中人依舊智短竇云貪觀白浪失却手橈莫放過好問如何是和尚家風㪯得莫鑑竇云客來須看土曠人稀進云恁麼則學人得見也多少點頭也無竇云三十𥝝後百千𥝝後不道無問如何是第一義俱竇云道士倒騎牛黑如漆學云乞師再垂方便得竇云無孔銕槌明如日問道遠乎哉言出扵己竇云青山夾乱流相別相逢學云恁麼則得聞於未聞去也不可止扵人竇云千里里皈去來問如何是吹毛劒斬也竇云苦祖師𭈬了也進云還許學人用也無不惜性命竇云噓了竇乃云大眾前共相酧唱也須是个漢始得何不早㪯若未有奔流度刃底眼不勞拈出鼻孔裏底所以道如大火聚近著則燎却靣門背地點頭去亦如按太阿寳劒衝前則𭈬身失命不肯孤負從上竇乃頌云太阿橫按祖堂寒突出目前千里應須息万端快便難逢莫待冷光輕閃爍徧界髑髏寒復云看看㘞便下座崑崙嚼生銕拈古㪯米胡問僧近離甚處細人不知僧云藥山用得一丸米云藥山老子近日如何箕裏觀見僧云大似頑石一般曾知羅篩米云得恁麼鄭重石壓笋斜出僧云也無提撥處果然米云非但藥山米胡亦恁麼喫著如苦辛僧近前顧視而立令我憶德山米云看看頑石動也放過一著其僧便出出了也無竇拈云米胡也縱奪可觀有个什麼爭柰死而不弔有權有實㪯賔國王仗劒詣師子尊者所乃問師得蘊空否實須問得尊者云已得万里一條銕王曰可我頭實須道得尊者曰身非我有豈况於頭風吹不入王遂斬之實須斬得白乳高丈餘水洒不著王臂自落實須知痛痒竇拈云作家君王天然有在也是㪯鏡清於僧堂前自擊鍾子云玄沙道底玄沙道底烏龜鎻破壁時有僧出來云玄沙道什麼口皮在甚𩂜鏡清作一圎相向背後問訊僧云若不久參爭知恁麼大家見他也無清云還我屮鞋錢來到如此始得竇拈云洎被打破蔡州一槌兩當㪯寳公云終日拈香擇火不知身是道場劈不開玄沙云終日拈香擇火不知真个道場提不起竇拈云一對無孔銕槌兩兩㪯五通仙人問佛云佛有六通如何是那一通用尽多少通佛召五通仙人爭柰那一通仙人應喏還有五通也未佛云那一通尒問我万里一條銕竇云老胡元不知有那一通却因邪打正理不曲断人云豈止而已㪯思和尚令石頭送書去讓和尚處云回日與子个鈯斧子住山去因風吹火石頭纔到讓和尚處便問不慕諸聖不重己靈時如何拔貪作富讓云子問太高生何不向下問將來見得巧藝石頭云乍可永劫沉淪不求諸聖解脫崖崩石裂便歸脚下底思和尚問書逹否不覺醜頭云書亦不逹信亦不通道什麼去日蒙和尚許鈯斧子便請一起一倒思垂下一足是則是可惜許頭便礼拜不与時人同竇拈云石頭洎擔板過却有後人在又云大小讓師不解據令有實有權㪯長髭到石頭處後人標榜頭問甚𩂜來不可不問髭云嶺南來草鞋露重頭云大𢈔嶺頭一鋪功德還成就也未洪波浩渺白浪滔天髭云成就久矣只欠點眼有心來由石頭云莫要點眼麼將錯就錯髭云便請果然只与麼頭垂下一足通𫕟有路髭便礼拜照天照地頭云見什麼道理便礼拜若無此語髭云如紅爐上一點雪乾不尽頭便休有什麼饆饠䭔子竇拈云無眼功德有什麼點處壁立万仞德山和尚到龍潭問久響龍潭及乎到來潭又不見龍又不現有氣息在龍潭云子親到龍潭敗不少山休去看看竇拈云將錯就錯同道方知又云大小德山果然竇一日因事舉往日有老宿一夏不為師僧話尽謂正令方行有僧自歎云我只恁麼空過一夏不望和尚佛法得聞正因兩字也得可痛可悲老宿聊聞云闍梨莫𧬊速若論正因一字也無恁麼道了扣齒云適來無端恁麼道好笑好笑隣壁有老宿聞云好一釜羹被兩顆鼠糞污却是什麼竇拈云誰家鍋釜無一兩顆也是也是觀和尚見新到來敗也觀作麵引次示之過也其僧便去勘過始得觀晚間問第一座今日新到在什麼處一賽兩彩第一座云當時去也實頭人難得觀云是即是只得一撅早知与麼竇拈云老觀大似失錢遭罪截頭覔活㪯外道問佛不問有言不問無言異中異也世尊據坐崑崙嚼生銕外道礼拜云世尊大慈大悲開我迷雲令我得入劒去久矣外道去後阿難問佛外道有何所證而言得入為眾竭力佛云如世良馬見鞭影而行兒孫依之而行竇拈云邪正不分過猶鞭影分而不分傅大士云夜夜抱佛眠手臂不向外朝朝還共起脚頭脚底起坐鎮相随無孔銕槌如身影相似頭上漫漫要識佛去𩂜咦只者語聲是突出難辨玄沙云大小傅大士只認得个昭昭靈靈半合半開竇拈云玄沙也是打草蛇驚強弱俱扶寳公令人傳語思大和尚何不下山教化眾生目視雲漢作什麼什麼什麼思大云三世諸佛被我一口吞盡何𩂜更有眾生可度只麼只麼竇拈云有什麼屎臭氣一狀領過趙州云至道無難唯嫌揀擇銕壁銕壁纔有語言是揀擇是明白早知与麼老僧不明白裏是尒作麼生護惜區區地也時有僧問云既不明白裏護惜个什麼似知時莭州云我亦不知壁立万仞僧云和尚既不知為什麼道不在明白裏可惜許个好拶州云問事即得坐断舌頭竇拈云趙州倒退三千一箭兩垜南泉示眾云三十𥝝來牧一頭水牯牛欲擬東邊放不免侵佗國王水草鼻孔欲擬西邊放不免侵佗國王水草兩重公案不如随分納些子免被官主勞撓頭角崢嶸長慶云尒道南泉前頭為人後頭為人随婁搜漢雲門云且道牛內納牛外納為物傷慈直饒道得納𩂜分明我更問尒牛在甚𩂜諸人只与麼去竇拈云一時穿却牛頭牛尾鄧隱峰在襄州破威儀堂只著襯衣於砧槌邊㪯槌云道得即不打眼眸重三斤于時大眾默然休得也未隱峰便打一下寡不歒眾竇拈云果然果然誰能辨別僧問玄沙大耳三蔵第三度為什麼不見國師你問也未玄沙云尒道前來兩度還見麼莫恠与麼便去竇拈云敗也敗也吽吽室中㪯古㪯睦州問僧近離甚𩂜彼此誰辨僧云河北也是州云河北有个趙州和尚曾到麼事生叮嚀僧云某甲近離彼中虚頭虚頭州云趙州有何言教示徒舌頭長多少僧云每見新到便問曾到此間來麼与趙老同參云曾到趙州云喫茶去狗𠾑赦書忽云不曾到趙州亦云喫茶去逹磨無齒睦州云慚愧慣得其便却問僧趙州意作麼生來由在之僧云只是一期方便噫睦云苦哉趙州被尒將一杓屎潑了也便打依令而行睦州却問沙𢏏尒作麼生沙𢏏便礼拜扶得者僧也無睦州亦打露柱喫始得其僧往沙𢏏𩂜問適來和尚打尒作什麼勘破睦州沙云若不是我和尚不打某甲便打竇云者僧克由尀耐將一杓屎潑他二貟古佛平出諸上座若能辨得非唯趙睦二州雪屈什麼𩂜去也亦乃翠峰与天下老宿无過在甚麼𩂜若道不得到𩂜潑人卒未了在富不學奢㪯僧問長慶如何是正法眼慶云有願不撒沙杲日麗天保福云不可更撒也什麼𩂜去也竇云夫宗師决定以本分相見不敢撒沙誰分上事且那个是諸人正眼何必不受人瞞底漢出來對眾道看共相知委却請若道不得翠峰一一与尒點過放光動地也未開眼也著合眼也著我見灯明佛本光瑞如此㪯黃檗有六人新到五人作礼其中一人提起坐具作一圎相跳不出檗云我聞有一獵犬甚𢙣不辤咬猪狗去僧云尋𦏰羊聲來弄響漢檗云𦏰羊無聲到汝尋小慈妨大慈僧云尋𦏰羊跡來自領出去檗云𦏰羊無跡到汝尋此老不易僧云尋𦏰羊蹤來合耴狗口檗云𦏰羊無蹤到汝尋便打僧云恁麼則死𦏰羊也果然檗便休是則是可惜許到來日上堂云獵犬在甚𩂜至今得个勞煩僧便出來个鈍漢檗云昨日公案未了老僧休去你作麼生當断不断却招其乱僧無語作家也無檗云將謂是本分衲子元來是義學沙門以拄杖打出賊過後張弓竇云只如聲響蹤跡既無獵犬向甚𩂜尋逐幸自縦遠莫是絕聲響蹤跡見黃檗麼馿屎比馬糞諸禪德要明䧟虎之機也須是本分衲子暫時不在㪯外道問佛不問有言不問無言誰謂外道𠀍尊良久風吹不入外道云𠀍尊大慈大悲開我迷雲令我得入可惜許竇云諸禪德迷雲既開决定見佛在甚麼𩂜還許他同參也無因誰致得若共相委知則天下宗師並為外道伴侶百千𥝝後不道無如各非印證則東土衲僧不如西天外道心不負人靣無慙色㪯龍牙和尚問翠微如何是祖師西來意脚跟下聻翠微云与我過禪板來若不与龍牙牙耴禪板与翠微令後人与麼去接得便打便打牙云打即任打要且無祖師意去去後又問臨際如何是祖師西來意不悮為龍牙際云与我過蒲團來踈而不漏牙耴蒲團与臨際不入虎爭見虎兕接得便打果然牙云打即任打要且無祖師意大有人不見竇云臨際翠微只解放不解収扶強不扶弱我當時若作龍牙待伊索蒲團禪板拈得劈胷便擲扶弱不扶強㪯樹問定山不落數量請師道多少人与麼會山提起數珠云是落不落月中断井索樹云圎珠三竅人人有請師圎前話快便難逢山便打令不浪行樹便去雲生足下山云三十𥝝後搥胷大哭去在未後太殷勤樹果後開堂示眾道三十𥝝前被定山老子瞞我一上不同小小好語不出口竇云定山用即用爭柰險一家有事樹知即知要且未曾具擇法眼也百家忙試請辨看只与麼去雪竇也湏失利㪯雪峰問投子一槌便成時如何問則問得投子云不是性𢤁漢答即答得峰云不假一槌時如何自救不了投子云者漆桶裂破竇云然則一期折挫雪峰早是遟回且投子是作家爐鞴閉門造車我當時若作雪峰待投子道不是性𢤁漢只向伊道鉗槌在我手裏失却一雙眼諸上座合与投子著得个什麼語太無厭生若能道得便乃性𢤁平生光揚宗眼暗裏見人若也顢頇頂上一搥莫言不道頼有个一著在㪯趙州問僧曾看法花經麼垜根底僧云看來為甚失却瞳人州云衲衣在空閑假名阿練若誑惑𠀍間人尒作麼生會道著其僧擬礼拜大好礼拜州云尒披衲衣來麼一去不再來僧云披來難得難得州云莫惑我德兮不孤僧云如何得不惑去快然自得州云莫耴我語即便請道竇云大小趙州龍頭蛇尾随𩂜作主諸人若能辨得便乃識破趙州噓噓如或不明个个高擁衲衣莫惑翠峰好除非眼裏無筋底㪯長髭問僧甚𩂜來抱贓呌屈僧云九華控石庵不同髭云庵主是什麼人知得主也未僧云馬祖下尊宿如虚髭云名什麼与麼也走去僧云不委佗法號可惜与麼髭云佗不委尒不委不委莫㪯僧云尊宿眼在甚𩂜堪任也未髭云若是庵主親來今日也須喫棒分明打著僧云頼遇和尚放過某甲家私難揚髭云百𥝝後討个師僧也難得長安雖不是久居竇云是則二俱作家要且只解収虎尾不能據虎頭從苗辨地若便德山令行並須瓦解因語識人㪯保福示眾云此事如擊石火閃電光轉過那邊搆得搆不得未免𭈬身失命好衲僧行履僧便問未審搆得底人還免𭈬身失命也無福云適來且致闍梨還搆得麼同途不同轍僧云若搆不得未免大眾笑更答得一點好福云作家作家可惜許僧云是什麼心行餓㣘囓枯骨福云一杓屎欄靣潑不知臰有人點頭去竇云諸上座保福有生擒虎兕底爪牙點者僧也不易相敵從容難語雖然如此要且放過保福一著以皃耴人只如翠峰与大眾還許諸方檢責也無大海從魚躍若免不得平地上死人無數只恐諸人孤負其中有得活底麼要落草去竇拈起拄杖云來也來也將謂此人㪯皈宗鋤草次見一條蛇以鋤斬之兩鏃蒺䔧僧見便問久響皈宗元來是个麁行沙門豈止与麼去宗云尒麁我麁是則是後雪峯問德山古人斬蛇意如何斬也山便打㘞峰便走脚頭聻山召云布衲被吹別調中峰囬首也知得心肝山云他後悟去方知老漢徹底老婆心土曠人稀竇云皈宗只解慎初不能護末有權也有實德山頗能據令且未明斬蛇有照也有用竇召大眾云看翠峰今日斬三五條因邪打正以拄杖一時打下一二三四五勘辨問僧甚𩂜來随第幾機僧云和尚問誰咦竇云我問尒鶻提鳩僧云何不領話情知尒底竇云翠峰今日敗無則寬恕滄海也須乾寳華侍者來看雪竇竇問寳華多少眾且許筭人侍者云不勞和尚如此一條綠水遶青山竇云我好好問尒㪍跳作什麼動則影現侍者云不得放過靜則冰生竇云真師子兒人無遠慮必有近憂喫茶了竇把住云適來得恁麼無礼相逢尽道休官去侍者擬議頼是尒擬議被竇一掌云皈去分明㪯佀寳華有意氣時添意氣不風流𩂜也風流有數人新到至竇云新到那故是僧云是太宋亦如扶桑竇云參堂去兩重公案僧便去个漆桶竇復喚來功不浪其僧却回上來下去馿𥝝得麼竇云洞庭難得師僧与尒一椀茶喫不得中即鑑還同野舎薪問僧甚𩂜受業𪭺謂雪竇僧云天章可惜許竇云𪭺得蘭亭記來麼佗時有人僧云爭敢呈似和尚家家閑家具竇云草本不勞拈出不免随佗轉却五人新到竇云洞庭絕頂無行路不假梯航速道看嶮僧云特來礼拜和尚兩兩三三舊路行竇云湛水停舟徒誇運濟好个誇運濟僧無語老胡不如竇云過者邊來鳥飛不度其僧齊過勘破了也竇云將頭不猛悮累三軍參堂去諸方難到問僧名什麼一且何來云義懷一任答去竇云何不名懷義親得親用僧云當時致得無柰阿你竇云誰与你安著還道得也無僧云某甲受戒來十秊也見得个老漢竇云行脚費却多少草鞋首尾一齊動僧云和尚莫瞞人好三生六十劫竇云我也沒量罪過尒作麼生勞力不少僧無語方知行脚師僧竇云脫空謾語漢便打𦛁後拔箭問新到近離甚𩂜脚頭聻僧云興教難掉動竇云逹磨一宗掃土而盡莫愛筋力僧無語時哉時哉竇云天上天下唯我獨尊龍頭蛇尾復問僧闍梨名什麼相逢尽道休官去僧云宗雅林下何曾見一人竇云雅即不問作麼生是宗不知明月落誰家僧無對道即道得竇云且限三日其僧頻來下語在什麼𩂜竇皆不諾什麼𩂜去也僧却問某甲見𩂜只恁麼和尚作麼生好一問竇云尒何不問我若無此語難見雪竇老僧方擬問佛手遮不得人心似閑被僧連打數下裂破裂破問新到發足甚𩂜休得始得僧拍掌一下只管見竇云兩重公案一隻一雙僧云恰是兵随印轉竇便喝賔主歷然僧無語時節難逢竇云還我一拍來此地無金二兩僧擬議先行不到末後為初竇云瞎漢參堂去却是笑具底六人新到竇問參頭夫為上將須是七事随身兩刃交鋒作麼生且打退皷僧云久嚮翠峰有此一著也何妨竇云一著放過還我草鞋錢來个个且去別時來僧喝其賦有詆諆竇便棒能有幾人僧約住拄杖与竇一拍是則是竇云未到翠峰与尒二十棒了也便打僧無語臨崖看虎眼竇云且在一邊堪作什麼用却問第二副將作麼生又憂塞北僧茫然何必竇云一狀領過伏惟伏惟喫茶了竇把住參頭云適來公案者裏即恁麼堂中作麼生㪯少秆曾聽稚兕歌僧擬議許你眼親竇打一坐具推出俱雪峰和尚塔銘并序夫從緣有者㪯來好也始終而成壞鳥飛不度非從緣得者因誰致得歷劫而常堅因甚凢聖出入堅之則在壞之則捐龍頭蛇尾雖然離散未至何妨預置者哉堆山積岳所以疊石結室翦木合函劈不開提不起般土積石為龕是什麼所在諸事已備有麼有麼頭南脚北橫山而臥道道惟願至時同道者莫違我意一家風知心者不易我志風行草偃深嘱載嘱耳朵一片皮幸勉勵焉俱俱縱饒佗日邪造顯揚見麼豈如當今正眼蜜𢎪更看善思之審思之確雪竇傳法賜紫重顯註兄弟添十字乎出竇云國無二君得又云知麼阿你同心著一儀拈也竇云風行草偃了又云直與獨立土主曰松山嶮嶮竇云四顧匪絕類又云看摐然𡖉塔號難提最高竇云獨露相𠋣塞又云嶮孤危更有胡家曲聾聾竇云一西一東築又云大難一危汝等切湏知過也竇云自南自北磕又云會也与麼我唱泥牛吼山河竇云聞莫㪯頭響又云呵呵片皮汝和木馬嘶天地竇云見應合眼普又云撫掌敗也但看五六月瞎瞎竇云豈可徒然知又云吁分開冰片滿長街寒毛竇云事非草草然又云苦吽吽薪盡火滅後銕壁竇云去去誰同噫又云好住著力密室爛如泥銀山竇云須到如此化又云努力頂住受師號上堂僧問皇恩已降海眾同觀斈人上來願聞㪯唱阿誰如你竇云好音在耳人皆聽東西南北進云聽後如何耳始聾也竇云問著元来揔不知漏逗不少僧云斈人到者裏實謂不知大言易出竇云許尒是个草賊放過一著復云禪家流還如戰將見闘勇健索不来即便擒下方知个老解与麼雖一期之作爭佀借水獻花唱太平歌好也是夜雨山草滋爽籟生古木金不金閑吟竺僊偈在什麼勝扵嚼金玉來也來也蟋蟀啼壞墻突在一邊苟兔悲𡱈促什麼什麼道人優曇花天覆不能迢迢遠山綠鳥飛不度是知道無不在却是道著誰云間然只个一句而已故天有道以輕清雲飛雨下地有道以肅靜山高海闊谷有道以盈滿還應得也無君有道以敷化故出來看我今上皇帝金輪統御睿澤霶流道得也未草木禽魚無遠不及誰過那邊巖野抱疾之士俄羕寵光金香炉下銕崑崙此生佗生無以云報崖崩石裂賢守司封高扶堯舜月白風清下視龔黃海宴河清襲千載之雅風填溝塞壑鎻萬邦之春色泰平無象佇當明詔闔國咸知別振休聲誰是知音貳車屯田諸廳朝宰一親一踈不敢飾辤褒讚還聽得此話麼仲尼言云吾禱久矣里一條銕大燈国師行狀大應国師唱臨済宗旨扵橫嶽万壽建長也乎四十年矣其間摳衣者不知何師其一也師諱妙超宗峰其號也生扵州揖西縣紀氏子父母禱扵本州書冩山如意輪觀音母夢一僧手白花開扵五葉而与之有妊而後如寐而不寤至其誕之時熟睡而不知也保母俄聞呱地一聲徃而見之未澡浴而肌體瑩㓗克𭭛克嶷頂骨聳立伏犀插額目光射人随面前人能轉顏目五嵗時見人發刀扵硎云何為而作也云貴圖快利云不快利有快利你還知麼其人罔測師呵大笑触事以言所挫人若比親有諫而欲使住之者拈棒便打鄉黨稱為神童矣十有一嵗而師事扵書冩山戒信律師每屏坐靜処志厭俗塵經書過目成誦一日慨然云假使究九流三蔵百家異道書爭若入不立文字直指單傳宗未剃染而發足至京城并相州參問諸尊宿雖氣吞佛祖底不敢嬰其鋒謁建長老問曰路逢死蛇莫打殺無底籃子盛将皈意旨如何老曰放下着者般底直下便看耴師云只如道直下便看耴如何老擬議師乃喝造万壽問佛國禪師曰佛法無多子著衣喫飯処即是纔作恁麼理會早是不是了也国云未知恁麼㕝以前与而今如何區別師云區則區別則不別国云試區別看師指露柱云喚者亇作露柱則与背時逈區不喚者亇作露柱則而今已別国云豈是佛法師云和尚好亇時莭國云只与麼受用与老僧別師云若見有和尚某甲佗日悔去国云平生日用処直下道來看師云步踏着毘盧頂言勘破維摩詰次日又來問云昨日与今日請師辨別国云說什麼昨日直道今日事師云雲従龍風従虎国云雲未起風未來時如何師云天上天下唯我独尊国云雲門云我當時若見一棒打殺与狗子喫貴圖天下太平如何師曰一口吞𨚫了也國橫点頭曰此語不敢肯師乃喝国亦喝師又喝而出去国送出門曰我見多少学者未嘗逢如公俊底冝祝髮披衣棟梁吾道師翌日重參佛国見來曰古人云大用現前不存䡄則時如何師曰和尚未問以前已現前久矣国云在甚麼処師曰夜來狂風吹折門前一枝松國云如何是狂風師搖手中扇子国休去師云狂風豈不是扇子国大笑云綐見相似𨚫也蹉了師扵此服膺矣自歎曰人身難得佛法難遇賤則貴豈丈夫志遂落髮受具旦夕留心扵此㕝一夕坐僧堂聞僧隔壁誦百丈語云靈光独耀逈絕根塵躰露真常不拘文字驀然有省夜半扣門呈其見解国云既是真正見解也冝建法幢立宗旨厥後大應国師應自橫岳來亰師舘于韜光庵師在相冽聞其手叚辛辣趨于亰徑詣其室問云学人遠來化下請師一接師云老來無力且坐喫茶師云恁麼用去只恐不肯国師云你是新到爭知這裏㕝師云千里同風豈不是君子国師云室中物色你試指出看師云七九六十三国師云無慚愧漢來処也不知師云謹謝老師以学人托上梵天国師云今日自領出去明日事你作麼生師云天際日上月下檻前山𭰹水寒国師云一死不𭁡活師便休国師便問五祖演示佛眼云牛過窓櫺頭角四蹄全出尾巴因甚出不得你試下一轉語看師云曲心已露国師云如何是曲心師云拄天拄地国師大笑云与麼空至他日有悔三日後師下語曰𣏐卜𦗟虚声国師云方得相似自尓晝参暮請不敢退轉国師時臥經旬閉方丈戶止学者㕘問唯師見許參請国師云你是天然衲子也不是一兩生參学士国師羕詔住京城萬壽師従之侍巾瓶国師示以翆岩眉毛在麼雲門云関之語也師下語云將錯就錯国師曰是則是你能扵関字着精彩他時別湏有生涯德治丁未国師赴于相州住建長師乃參随至彼未經十日因案上放在鎖子忽然打透関字到了圎融無際真實諦當大法現前処汗流浹背急趨方丈下語曰乎同路国師大愕云夜來夢見雲門入吾室你今日透関字你是雲門𭁡來也師掩耳而出翌日呈二偈云一囬透過雲関了南北東西活路通夕處朝遊沒賔主頭底起清風透過雲関無旧路青天白日是家山機輪通変難人到金色頭陁拱手還妙超胸懷如是若不孤負師意伏望賜一言近擬故都莫惜尊意以為大幸耳国師掇茟自書其後云你既明投暗合吾不如你吾宗到你大立去只是二十年長養使人知此證明矣為妙超禪人書巨福山南浦紹明延慶戊申臘月国師示滅心䘮既畢亰而卜居扵洛水東衲子纔六七輩刻苦自厲至忘寒飢一夕夢有六人僧狀若羅漢居第一位僧云出𠀍時至何不出也師云仁義盡従貪𩂜断僧即頷而以竹針挑破𦛁後云為你抉出貧肉覚後頭𦛁尚痛焉不而去雲居徙居城北紫野不立佛殿唯𣗳法坣洗心子玄恵法師偕儒者九人奏扵朝欲破禪宗禪宗若有奇特㕝吾俯豈敢諸儒徵詰諸方禪將無有當意者諸儒聞師名而特來問云禪宗手叚如何師云以偽示真實儒云聖人有言否師云有云既是聖人有甚虚言師云不見孟子有之象謂已殺舜了而入宮見舜在床琴舜見象來而喜豈不是偽其間激揚鏗鏘問荅罷儒却問師云畢竟如何决断北義去也師云舜却殺象了也諸儒皆稽䫙而執弟子礼就中洗心子入室參禪造詣不淺不勝崇信之至第宅而作大德方丈今雲門庵是也師氣宇如王人少近傍数年罕有為檀越外護者一旦萩原法皇聞其風而召入內上遣中使告師而𣣔披道服而除一重坐席談話師𭁡三乞着袈裟而對坐一一許之帝勑云佛法不思議与王法對坐師奏云王法不思議与佛法對坐上動龍顏一日上勑問云不与万法為侶者是什麼人師搖手中扇子云皇風永扇一日面有勑云朕欲以大德寺為朝廷第一祈禱処去師受命而云唯後醍醐天皇即位如前所勑礼敬敦寵㤙益渥帝召弟子僧入內帝問云不与万法為侶者是什麼人僧起而鞠躬僧却奏云不与万法為侶者什麼人上以手中珪劃一劃云這亇聻師上法語云億刧相離而不相離尽日相對而不相對不審是什麼物請𦗟綸言帝御茟書紙尾云昨夜三更露柱向和尚道了也上書投機頌賜師云二十年來辛苦人𨒦春不換旧風𤇆着衣喫飯恁麼去大地那曾有一塵又書紙尾云弟子有亇悟処以何驗朕師又書云老僧恁麼驗聻又御茟書古人節角誵訛則語問師謹書紙奏對不可勝計勑洞院都護請師入禁掖就五莭所俄設法座請師陞座面前懸百丈禪師頂相帝亦扵法座右側設御榻側𦗟月𡖖雲客皆在扵左右前後拈香祝聖罷師下法座帝亦下御榻師奏云臣僧適來許多鄙俚言說㓛皈何処帝指百丈真云百丈禪師為證明師云此外更無有人作證明麼帝便竪起拳頭師云与麼則南山朝北闕夜見明星帝瞬目而揖師鞠躬而出去皇情大恱次日賜兼金縑帛兩朝特賜興禪大灯高照正灯国師号所賜庄田濃州長森播州小宅三職方并浦上総州遠山方御厨信州伴野紀州高家仍見下官府宣正中年南禪虚席詔下請師𭁡三竟不赴建武初下綸旨云大德禪寺冝處五山之一也師却而不受之又下詔云冝相並南禪淨𠛴萩原法皇後醍醐天皇親宸翰有一流相羕不許他門住涇渭殊流貽言扵華御製臨之刊之見懸扵額左右萩原法皇自剪御髮造小安扵其中被置在靈光左邊盖為結与大燈當來𠀍香火緣也筑州太宰府都督司馬少卿上帖扵師請住橫岳山崇福禪寺詣闕而以此㕝奏帝堅留之重敷奏以師翁行道地帝乃允之纔作百日主而告退还皈于大德垂三轉語示衣云朝結眉夕交肩我何似露柱𥁞日徃來我囙甚不動若透得亇兩轉語一生參学㕝了畢建武丁丑冬一夕召首座德禪開山徹翁和尚也曰我化緣已𥁞衣法并本寺末寺住持職㕝悉付与你克令子孫接續使不断絕未得臘月二十一日夜書亨首座相従久矣悟徹既人皆知之語而授焉又示遺誡扵諸弟子云我行而後置骨扵丈室莫別造其有以也夫汝冝委悉二十二日午時欲端坐胡床示滅而久有足患不克結跏趺坐首座出以比為憾語師自以兩手加左足扵右股上左膝傷折血流霑衣至今血痕尚存焉乃書辝𠀍偈云截断佛祖吹毛常磨機輪轉処虚空咬牙擲茟而逝大鑑禪師時住南禪有人傳誦遺偈鑑聞而大驚云不意日本有明眼宗師也平生欲會面而人皆沮止之遺恨不少欲赴茶毗而緣有朝廷祈禱㕝不能也且遣僧人伺茶毗時至馳皈告之乃率大眾出山門頭諷經遣侍者二人贈瓣香溫中和尚正翁和尚也瓣香至今為寺什物世壽五十六僧臈三十四門人悉遵遺誡親羕印可嗣其法者妙心関山和尚興德海岸池寺白翁野州了翁長福璧峰金日山貞庵主可監寺和典座各拠一方接引学者師平居与物為春無町畦也迄于夫陞堂而𬼌拂子開室而握竹篦以機攻機如張良躡足而封韓信是賊知賊若孫子减竈而敗龐㳙阿脩羅王托動三有大城金翅鳥王擘破娑竭羅海談笑而起臨濟扵己仆叱咜而破雲門之機関到于極処穿山透石壁鼻孔血淋淋有語錄三帙一帙雪竇錄着語有自來矣按夫雲門遺誡云吾滅後置吾扵方丈中上或賜額懸扵方丈勿別營作又遺表云聯叨鳳詔累對龍庭継奉頌宣重疊慶賜師示遺誡准雲門故㕝置骨扵方丈賜靈光額兩朝寵光優渥嬰足患大應雲門𭁡誕語𮈔髮不爽也大應滅後十有九白嘉曆元年奉詔開大德法堂一香供大應二十年長養記莂若合符節入滅纔九十年矣夫何門冷落子孫寢㣲所謂強弩之末勢不能穿魯縞者歟寔足歎息應永三十三年集丙午九月日德禪遠孫小比丘禪興謹狀梗槩以備大方尊宿名公銘之目云開山大灯国師語錄板行值応仁世乱壞刧時燒失矣今既逮百五十餘嵗十二世之子系宗玩衣盂資𭁡刊三帙錄不直半文錢若遂他昭覧則人謂家醜向外揚矣時元和七辛酉年七月日奉寄附于大德雲門𤲅
